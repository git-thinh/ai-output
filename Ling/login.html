<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.0/font/bootstrap-icons.css">
  
  <!-- Tailwind CSS CDN (v4 compatible) -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-100 px-4 py-5 sm:p-6 lg:px-8">
  <div class="bg-white p-8 rounded shadow-md max-w-md w-full space-y-4">
    <h2 class="text-2xl font-bold text-center text-gray-900">Login</h2>
    
    <div class="relative">
      <input type="text" placeholder="Username" required autocomplete="username" class="w-full pl-10 pr-3 py-2 border rounded-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
      <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-3 top-1/translate-y-1/2 h-5 w-5 text-gray-400" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16z" clipRule="evenodd" />
        <path d="M10 7a3 3 0 11-3 3 3 3 0 013-3z" />
      </svg>
    </div>

    <div class="relative">
      <input type="password" placeholder="Password" required autocomplete="current-password" class="w-full pl-10 pr-3 py-2 border rounded-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
      <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-3 top-1/translate-y-1/2 h-5 w-5 text-gray-400" viewBox="0 0 20 20" fill="currentColor">
        <path d="M3.646 4.646a.5.5 0 01.708 0L10 8.293l3.646 3.647a.5.5 0 01-.708.708L10 8.293l-3.647 3.646a.5.5 0 01-.708-.708L8.293 10 4.646 6.354a.5.5 0 010-.708z" />
        <path fill-rule="evenoid" d="M10 15A5 5 0 1010 5 5 5 0 0010 15zm0-2a3 3 0 110 6 3 3 0 010-6z" />
      </svg>
    </div>

    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-md transition duration-150 ease-in-out">Login</button>
    
    <p class="text-center text-sm text-gray-500 mt-4">
      Don't have an account? <a href="#" class="underline text-indigo-600 hover:text-indigo-700">Sign up</a>
    </p>
  </div>
</body>
</html>
