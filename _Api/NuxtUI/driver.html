<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudDrive — File Management Dashboard</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- FontAwesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'gray-850': '#1a2035',
            'gray-925': '#0f1422',
          }
        }
      }
    }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }

    /* Sidebar toggle hack */
    #sidebar-toggle:checked ~ .sidebar-overlay { display: block; }
    #sidebar-toggle:checked ~ .main-wrapper .mobile-sidebar { transform: translateX(0); }

    /* Dropdown hack */
    .dropdown-toggle:checked + .dropdown-menu { display: block; }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

    .dark-scroll::-webkit-scrollbar-thumb { background: #334155; }

    /* Smooth transitions */
    .transition-all { transition: all 0.2s ease; }

    /* File row hover */
    .file-row:hover { background-color: rgba(99, 102, 241, 0.05); }
    .dark-file-row:hover { background-color: rgba(99, 102, 241, 0.1); }

    /* Card hover lift */
    .card-hover:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .dark-card-hover:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
  </style>
</head>
<body class="bg-gray-100">

<!-- ============================================================ -->
<!--  SECTION 1 — LIGHT THEME                                     -->
<!-- ============================================================ -->

<div class="min-h-screen bg-gray-50 flex flex-col">

  <!-- ── TOP HEADER ── -->
  <header class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-40">
    <div class="flex items-center gap-3 px-4 py-3">

      <!-- Mobile Sidebar Toggle -->
      <label for="sidebar-toggle-light" class="md:hidden cursor-pointer flex items-center justify-center w-9 h-9 rounded-lg hover:bg-gray-100 text-gray-500">
        <i class="fa-solid fa-bars text-lg"></i>
      </label>

      <!-- Logo -->
      <a href="#" class="flex items-center gap-2 shrink-0">
        <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
          <i class="fa-solid fa-cloud text-white text-sm"></i>
        </div>
        <span class="font-bold text-gray-800 text-lg hidden sm:block">CloudDrive</span>
      </a>

      <!-- Search Bar -->
      <div class="flex-1 max-w-2xl mx-auto">
        <div class="relative">
          <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
          <input
            type="text"
            placeholder="Search files, folders, and more..."
            class="w-full pl-10 pr-4 py-2.5 bg-gray-100 border border-transparent rounded-xl text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:bg-white focus:border-indigo-300 focus:ring-2 focus:ring-indigo-100 transition-all"
          />
          <span class="hidden md:flex items-center gap-1 absolute right-3 top-1/2 -translate-y-1/2 bg-white border border-gray-200 rounded-md px-1.5 py-0.5 text-xs text-gray-400 shadow-sm">
            <i class="fa-solid fa-keyboard text-xs"></i> ⌘K
          </span>
        </div>
      </div>

      <!-- Right Actions -->
      <div class="flex items-center gap-1 sm:gap-2 shrink-0">

        <!-- Notification Bell -->
        <button class="relative w-9 h-9 rounded-lg flex items-center justify-center hover:bg-gray-100 text-gray-500 transition-all">
          <i class="fa-solid fa-bell text-base"></i>
          <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
        </button>

        <!-- Settings -->
        <button class="hidden sm:flex w-9 h-9 rounded-lg items-center justify-center hover:bg-gray-100 text-gray-500 transition-all">
          <i class="fa-solid fa-gear text-base"></i>
        </button>

        <!-- Theme Toggle Indicator (static — light mode indicator) -->
        <div class="hidden sm:flex items-center gap-1.5 bg-gray-100 rounded-lg px-2 py-1.5 border border-gray-200">
          <i class="fa-solid fa-sun text-amber-500 text-sm"></i>
          <span class="text-xs font-medium text-gray-500">Light</span>
        </div>

        <!-- Profile Avatar -->
        <div class="relative ml-1">
          <input type="checkbox" id="profile-dd-light" class="peer hidden" />
          <label for="profile-dd-light" class="flex items-center gap-2 cursor-pointer">
            <div class="w-9 h-9 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-semibold text-sm shadow-sm ring-2 ring-white">
              JD
            </div>
            <div class="hidden md:block">
              <p class="text-sm font-semibold text-gray-800 leading-tight">John Doe</p>
              <p class="text-xs text-gray-400 leading-tight">john@cloudrive.io</p>
            </div>
            <i class="fa-solid fa-chevron-down text-xs text-gray-400 hidden md:block"></i>
          </label>
          <!-- Dropdown -->
          <div class="dropdown-menu hidden peer-checked:block absolute right-0 top-12 w-52 bg-white border border-gray-200 rounded-xl shadow-xl z-50 overflow-hidden">
            <div class="px-4 py-3 border-b border-gray-100 bg-gray-50">
              <p class="text-sm font-semibold text-gray-800">John Doe</p>
              <p class="text-xs text-gray-500">john@cloudrive.io</p>
            </div>
            <ul class="py-1">
              <li><a href="#" class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-indigo-50 hover:text-indigo-600"><i class="fa-solid fa-user w-4"></i> Profile</a></li>
              <li><a href="#" class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-indigo-50 hover:text-indigo-600"><i class="fa-solid fa-gear w-4"></i> Settings</a></li>
              <li><a href="#" class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-indigo-50 hover:text-indigo-600"><i class="fa-solid fa-shield w-4"></i> Privacy</a></li>
              <li class="border-t border-gray-100 mt-1">
                <a href="#" class="flex items-center gap-3 px-4 py-2.5 text-sm text-red-500 hover:bg-red-50"><i class="fa-solid fa-right-from-bracket w-4"></i> Sign out</a>
              </li>
            </ul>
          </div>
        </div>

      </div>
    </div>
  </header>

  <!-- ── BODY WRAPPER ── -->
  <div class="flex flex-1 overflow-hidden relative">

    <!-- Mobile Sidebar Toggle Input -->
    <input type="checkbox" id="sidebar-toggle-light" class="peer hidden" />

    <!-- Mobile Overlay -->
    <label for="sidebar-toggle-light" class="hidden peer-checked:block fixed inset-0 bg-black/40 z-30 md:hidden"></label>

    <!-- ── SIDEBAR ── -->
    <aside class="
      fixed md:static inset-y-0 left-0 z-40
      w-64 bg-white border-r border-gray-200 flex flex-col
      -translate-x-full md:translate-x-0 peer-checked:translate-x-0
      transition-transform duration-300 ease-in-out
      shadow-xl md:shadow-none
      top-0 md:top-auto
    ">
      <!-- Sidebar Header (mobile) -->
      <div class="flex items-center justify-between px-4 py-4 border-b border-gray-100 md:hidden">
        <div class="flex items-center gap-2">
          <div class="w-7 h-7 bg-indigo-600 rounded-lg flex items-center justify-center">
            <i class="fa-solid fa-cloud text-white text-xs"></i>
          </div>
          <span class="font-bold text-gray-800">CloudDrive</span>
        </div>
        <label for="sidebar-toggle-light" class="cursor-pointer text-gray-400 hover:text-gray-600">
          <i class="fa-solid fa-xmark text-lg"></i>
        </label>
      </div>

      <!-- New Button -->
      <div class="p-4">
        <button class="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-4 rounded-xl shadow-md shadow-indigo-200 transition-all hover:shadow-lg hover:shadow-indigo-300 hover:-translate-y-0.5">
          <i class="fa-solid fa-plus text-sm"></i>
          <span>New</span>
        </button>
      </div>

      <!-- Navigation -->
      <nav class="flex-1 px-3 pb-4 overflow-y-auto space-y-0.5">
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider px-3 py-2">Main</p>

        <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-indigo-50 text-indigo-700 font-medium text-sm group">
          <div class="w-8 h-8 bg-indigo-100 rounded-lg flex items-center justify-center group-hover:bg-indigo-200 transition-all">
            <i class="fa-solid fa-hard-drive text-indigo-600 text-sm"></i>
          </div>
          My Drive
          <span class="ml-auto bg-indigo-100 text-indigo-600 text-xs font-semibold px-2 py-0.5 rounded-full">12</span>
        </a>

        <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 hover:text-gray-900 font-medium text-sm group transition-all">
          <div class="w-8 h-8 bg-gray-100 rounded-lg flex items-center justify-center group-hover:bg-gray-200 transition-all">
            <i class="fa-solid fa-users text-gray-500 text-sm"></i>
          </div>
          Shared with me
        </a>

        <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 hover:text-gray-900 font-medium text-sm group transition-all">
          <div class="w-8 h-8 bg-gray-100 rounded-lg flex items-center justify-center group-hover:bg-gray-200 transition-all">
            <i class="fa-solid fa-clock text-gray-500 text-sm"></i>
          </div>
          Recent
          <span class="ml-auto bg-gray-100 text-gray-500 text-xs font-semibold px-2 py-0.5 rounded-full">5</span>
        </a>

        <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 hover:text-gray-900 font-medium text-sm group transition-all">
          <div class="w-8 h-8 bg-gray-100 rounded-lg flex items-center justify-center group-hover:bg-amber-100 transition-all">
            <i class="fa-solid fa-star text-amber-400 text-sm"></i>
          </div>
          Starred
        </a>

        <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 hover:text-gray-900 font-medium text-sm group transition-all">
          <div class="w-8 h-8 bg-gray-100 rounded-lg flex items-center justify-center group-hover:bg-red-50 transition-all">
            <i class="fa-solid fa-trash text-gray-400 text-sm"></i>
          </div>
          Trash
        </a>

        <div class="pt-4">
          <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider px-3 py-2">Storage</p>

          <!-- Storage Usage -->
          <div class="mx-3 p-3 bg-gradient-to-br from-indigo-50 to-purple-50 rounded-xl border border-indigo-100">
            <div class="flex items-center justify-between mb-2">
              <span class="text-xs font-medium text-gray-600">Used Storage</span>
              <span class="text-xs font-bold text-indigo-700">8.2 / 15 GB</span>
            </div>
            <div class="w-full bg-indigo-100 rounded-full h-1.5">
              <div class="bg-gradient-to-r from-indigo-500 to-purple-500 h-1.5 rounded-full" style="width: 55%"></div>
            </div>
            <p class="text-xs text-gray-500 mt-2">6.8 GB remaining</p>
            <button class="mt-3 w-full text-xs font-semibold text-indigo-600 border border-indigo-200 bg-white hover:bg-indigo-600 hover:text-white py-1.5 rounded-lg transition-all">
              Upgrade Plan
            </button>
          </div>
        </div>
      </nav>
    </aside>

    <!-- ── MAIN CONTENT ── -->
    <main class="flex-1 overflow-y-auto bg-gray-50 px-4 md:px-6 lg:px-8 py-6">

      <!-- Page Title Row -->
      <div class="flex items-center justify-between mb-6">
        <div>
          <h1 class="text-xl font-bold text-gray-900">My Drive</h1>
          <p class="text-sm text-gray-500 mt-0.5">Manage and organize all your files</p>
        </div>
        <div class="flex items-center gap-2">
          <button class="hidden sm:flex items-center gap-2 px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm text-gray-600 hover:border-indigo-300 hover:text-indigo-600 transition-all shadow-sm">
            <i class="fa-solid fa-arrow-up-from-bracket text-sm"></i>
            <span>Upload</span>
          </button>
          <button class="flex items-center gap-2 px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm text-gray-600 hover:border-gray-300 transition-all shadow-sm">
            <i class="fa-solid fa-sliders"></i>
            <span class="hidden sm:inline">Filter</span>
          </button>
          <button class="w-9 h-9 bg-white border border-gray-200 rounded-lg flex items-center justify-center text-gray-600 hover:border-gray-300 transition-all shadow-sm">
            <i class="fa-solid fa-grip"></i>
          </button>
          <button class="w-9 h-9 bg-white border border-gray-200 rounded-lg flex items-center justify-center text-gray-600 hover:border-gray-300 transition-all shadow-sm">
            <i class="fa-solid fa-list"></i>
          </button>
        </div>
      </div>

      <!-- ── QUICK ACCESS ── -->
      <section class="mb-8">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-base font-semibold text-gray-800 flex items-center gap-2">
            <i class="fa-solid fa-bolt text-amber-400"></i>
            Quick Access
          </h2>
          <a href="#" class="text-sm text-indigo-600 hover:text-indigo-700 font-medium hover:underline">View all</a>
        </div>

        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-3">

          <!-- Folder
