<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <!-- Tailwind CSS v4 -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.0/font/bootstrap-icons.css">
    
    <style type="text/css">
        body {
            @apply bg-gray-50 min-h-screen flex items-center justify-center p-4 sm:p-6;
        }
        .login-card {
            @apply bg-white rounded-lg shadow-xl p-8 w-full max-w-md;
        }
        .input-group {
            @apply mb-4;
        }
        .btn-primary {
            @apply bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded;
        }
        .footer-links a {
            @apply text-blue-600 hover:text-blue-800 underline;
        }
    </style>
</head>
<body class="p-5">
    <div class="login-card">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">Sign in to your account</h1>
        </div>
        
        <form class="space-y-6">
            <!-- Email Field -->
            <div class="input-group">
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
                <div class="relative">
                    <input type="email" id="email" name="email" required 
                           class="appearance-none block w-full px-3 py-2 border border-gray-300 leading-tight focus:outline-none focus:ring-blue-500 focus:border-blue-500 rounded-md">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="bi bi-envelope"></i>
                    </span>
                </div>
            </div>
            
            <!-- Password Field -->
            <div class="input-group">
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <input type="password" id="password" name="password" required 
                           class="appearance-none block w-full px-3 py-2 border border-gray-300 leading-tight focus:outline-none focus:ring-blue-500 focus:border-blue-500 rounded-md">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="bi bi-lock"></i>
                    </span>
                </div>
            </div>
            
            <!-- Remember Me & Forgot Password -->
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input type="checkbox" id="remember" class="h-4 text-blue-600 rounded">
                    <label for="remember" class="ml-2 block text-sm text-gray-900">Remember me</label>
                </div>
                <a href="#" class="text-sm font-medium text-blue-600 hover:text-blue-800 underline">Forgot password?</a>
            </div>
            
            <!-- Submit Button -->
            <div class="buttons">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md transition duration-300 ease-in-out transform hover:-translate-y-0.5">
                    Sign in
                </button>
            </div>
        </form>
        
        <div class="mt-6 text-center">
            <p class="text-sm text-gray-600">Don't have an account? <a href="#" class="font-medium text-blue-600 hover:text-blue-800 underline">Sign up</a></p>
        </div>
    </div>
</body>
</html>
