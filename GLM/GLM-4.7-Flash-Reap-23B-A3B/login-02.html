<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    
    <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        /* Custom focus ring animation for smoother feel */
        .input-group:focus-within label {
            color: #4f46e5; /* Tailwind indigo-600 */
        }
        
        /* Simple fade-in animation for the card */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-600 via-indigo-600 to-purple-700 flex items-center justify-center font-sans text-gray-800">

    <!-- Main Container -->
    <div class="w-full max-w-md px-4 animate-fade-in">
        
        <!-- Login Card -->
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden border border-gray-100">
            
            <!-- Header Section -->
            <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-8 text-center text-white relative overflow-hidden">
                <!-- Decorative circle -->
                <div class="absolute -top-10 -right-10 w-40 h-40 bg-white opacity-10 rounded-full"></div>
                
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-white/20 backdrop-blur-sm mb-4 border border-white/30">
                    <i class="bi bi-person-circle text-4xl"></i>
                </div>
                <h1 class="text-2xl font-bold tracking-wide">Welcome Back</h1>
                <p class="text-blue-100 text-sm mt-1">Sign in to access your dashboard</p>
            </div>

            <!-- Form Section -->
            <form class="p-8 space-y-6" onsubmit="event.preventDefault();">
                
                <!-- Email Input -->
                <div class="input-group relative">
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1">Email Address</label>
                    <div class="relative">
                        <i class="bi bi-envelope absolute left-3 top-3.5 text-gray-400 text-lg transition-colors"></i>
                        <input type="email" placeholder="you@example.com" class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-gray-700 placeholder-gray-400">
                    </div>
                </div>

                <!-- Password Input -->
                <div class="input-group relative">
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1">Password</label>
                    <div class="relative">
                        <i class="bi bi-lock absolute left-3 top-3.5 text-gray-400 text-lg transition-colors"></i>
                        <input type="password" placeholder="••••••••" class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-gray-700 placeholder-gray-400">
                    </div>
                </div>

                <!-- Actions Row -->
                <div class="flex items-center justify-between text-sm">
                    <div class="flex items-center gap-2 cursor-pointer hover:text-blue-600 transition-colors">
                        <i class="bi bi-eye-slash"></i>
                        <span>Show Password</span>
                    </div>
                    <a href="#" class="text-blue-600 hover:text-blue-800 font-medium transition-colors">Forgot Password?</a>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-lg shadow-lg hover:shadow-xl transform transition duration-200 active:scale-95 flex items-center justify-center gap-2 mt-4">
                    <i class="bi bi-box-arrow-in-right text-xl"></i>
                    <span>Sign In</span>
                </button>
            </form>

            <!-- Footer -->
            <div class="px-8 pb-8 text-center text-sm text-gray-500">
                <p>Don't have an account? <a href="#" class="text-blue-600 font-semibold hover:underline">Sign up</a></p>
            </div>
        </div>
    </div>

</body>
</html>
