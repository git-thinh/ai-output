<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    
    <!-- Tailwind CSS v4 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Custom Styles for specific animations or overrides -->
    <style>
        body {
            background-image: url('https://picsum.photos/seed/bg/1920/1080.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        
        /* Overlay to ensure text readability over the background image */
        .bg-overlay {
            background-color: rgba(15, 23, 42, 0.85); /* Slate-900 with opacity */
        }

        /* Smooth transition for the password toggle */
        .password-input {
            transition: all 0.2s ease-in-out;
        }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center font-sans text-slate-800">

    <!-- Main Container -->
    <div class="bg-overlay w-full min-h-screen flex items-center justify-center p-4">
        
        <!-- Login Card -->
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all duration-300 hover:scale-[1.01]">
            
            <!-- Header Section -->
            <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-8 text-center relative">
                <div class="absolute top-0 left-0 w-full h-full bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10"></div>
                <div class="relative z-10">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-white/20 rounded-full mb-4 backdrop-blur-sm">
                        <i class="bi bi-box-seam text-3xl text-white"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-white tracking-wide">Welcome Back</h1>
                    <p class="text-blue-100 text-sm mt-1">Sign in to your account to continue</p>
                </div>
            </div>

            <!-- Form Section -->
            <div class="p-8">
                <form id="loginForm" class="space-y-5" onsubmit="handleLogin(event)">
                    
                    <!-- Email Input -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-slate-700 mb-1 ml-1">Email Address</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="bi bi-envelope text-slate-400"></i>
                            </div>
                            <input type="email" id="email" class="password-input w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors" placeholder="you@example.com" required>
                        </div>
                    </div>

                    <!-- Password Input -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-slate-700 mb-1 ml-1">Password</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="bi bi-lock text-slate-400"></i>
                            </div>
                            <input type="password" id="password" class="password-input w-full pl-10 pr-10 py-3 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors" placeholder="••••••••" required>
                            
                            <!-- Toggle Visibility Button -->
                            <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-blue-600 focus:outline-none">
                                <i id="toggleIcon" class="bi bi-eye-slash"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Remember Me & Forgot Password -->
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <input id="remember-me" type="checkbox" class="w-4 h-4 text-blue-600 bg-gray-300 border-gray-300 rounded focus:ring-blue-500">
                            <label for="remember-me" class="ml-2 text-sm text-slate-600">Remember me</label>
                        </div>
                        <a href="#" class="text-sm text-blue-600 hover:text-blue-800 font-medium hover:underline">Forgot password?</a>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all duration-200 shadow-md flex items-center justify-center gap-2">
                        <span>Sign In</span>
                        <i class="bi bi-arrow-right"></i>
                    </button>
                </form>

                <!-- Footer -->
                <div class="mt-6 text-center text-sm text-slate-600">
                    Don't have an account? 
                    <a href="#" class="text-blue-600 font-bold hover:text-blue-800 hover:underline">Sign up</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Toast (Hidden by default) -->
    <div id="toast" class="fixed top-5 right-5 bg-white border-l-4 border-green-500 shadow-lg rounded-lg p-4 transform translate-x-full transition-transform duration-300 z-50 flex items-center gap-3">
        <i class="bi bi-check-circle-fill text-green-500 text-xl"></i>
        <div>
            <h4 class="font-bold text-slate-800">Success</h4>
            <p class="text-sm text-slate-600">Login credentials verified.</p>
        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // Toggle Password Visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('bi-eye-slash');
                toggleIcon.classList.add('bi-eye');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('bi-eye');
                toggleIcon.classList.add('bi-eye-slash');
            }
        }

        // Handle Form Submission
        function handleLogin(event) {
            event.preventDefault(); // Stop page reload
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const toast = document.getElementById('toast');

            // Simple validation simulation
            if(email && password) {
                // Show Success Toast
                toast.classList.remove('translate-x-full');
                
                // Hide Toast after 3 seconds
                setTimeout(() => {
                    toast.classList.add('translate-x-full');
                }, 3000);

                console.log("Login Attempt:", { email, password });
            }
        }
    </script>
</body>
</html>
