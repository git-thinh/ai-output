<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login</title>
    
    <!-- Tailwind CSS CDN (Using a modern setup) -->
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom Tailwind Configuration (Optional, but good practice) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary': '#4f46e5', // Indigo
                        'secondary': '#10b981', // Emerald
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <!-- Login Card Container -->
    <div class="w-full max-w-md bg-white shadow-2xl rounded-xl p-8 sm:p-10">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <i class="bi bi-person-circle text-primary text-5xl mb-3"></i>
            <h1 class="text-3xl font-extrabold text-gray-900">Welcome Back</h1>
            <p class="mt-2 text-gray-500">Sign in to continue to your account.</p>
        </div>

        <!-- Login Form -->
        <form action="#" method="POST" class="space-y-6">
            
            <!-- Email Input Group -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <div class="relative">
                    <!-- Icon Placeholder -->
                    <i class="bi bi-envelope absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="you@example.com"
                        required
                        class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-primary focus:border-primary transition duration-150 ease-in-out"
                    >
                </div>
            </div>

            <!-- Password Input Group -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <!-- Icon Placeholder -->
                    <i class="bi bi-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="••••••••"
                        required
                        class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-primary focus:border-primary transition duration-150 ease-in-out"
                    >
                </div>
            </div>

            <!-- Options and Forgot Password -->
            <div class="flex items-center justify-between text-sm">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-primary border-gray-300 rounded focus:ring-primary">
                    <label for="remember-me" class="ml-2 block text-gray-900">
                        Remember me
                    </label>
                </div>
                <a href="#" class="font-medium text-primary hover:text-indigo-700 transition duration-150">
                    Forgot your password?
                </a>
            </div>

            <!-- Submit Button -->
            <div>
                <button 
                    type="submit" 
                    class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-md text-lg font-semibold text-white bg-primary hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition duration-150 ease-in-out"
                >
                    Sign In
                </button>
            </div>
        </form>

        <!-- Footer Link -->
        <div class="mt-8 text-center text-gray-600">
            <p class="text-sm">
                Don't have an account? 
                <a href="#" class="font-medium text-secondary hover:text-emerald-700 transition duration-150">
                    Sign Up Now
                </a>
            </p>
        </div>

    </div>

</body>
</html>
