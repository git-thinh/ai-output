<!DOCTYPE html>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<div class="dark:bg-gray-950 bg-white p-[24px] max-w-sm mx-auto shadow-xl transition duration-300 border border-gray-100 dark:border-gray-800">

    <!-- Product Code -->
    <div class="text-[12px] text-[#6c757d] dark:text-[#a1a1aa] mb-[4px]">
        25214 - 742
    </div>

    <!-- Product Name -->
    <h1 class="text-[28px] font-semibold leading-none mb-[4px] text-gray-900 dark:text-white">
        Trousers, men
    </h1>

    <!-- Fit -->
    <p class="text-[16px] text-[#495057] dark:text-[#c0c0c0] mb-[18px]">
        Classic fit
    </p>

    <!-- Color Description -->
    <div class="text-[14px] text-[#343a40] dark:text-[#d4d4d4] mb-[16px]">
        Midnight Blue / Lightgrey Stripes
    </div>

    <!-- Color Swatches Container -->
    <div class="flex space-x-[10px] mb-[24px]">
        <!-- Swatch 1: Solid Dark Blue -->
        <div class="w-[32px] h-[32px] rounded-full border-2 border-gray-300 dark:border-gray-700 bg-[#1e3a8a] cursor-pointer transition duration-150 shadow-sm hover:ring-2 ring-[#1e3a8a]"></div>
        
        <!-- Swatch 2: Patterned (Simulated) -->
        <div class="w-[32px] h-[32px] rounded-full border-2 border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 flex items-center justify-center cursor-pointer transition duration-150 shadow-sm hover:ring-2 ring-[#343a40]">
            <!-- Pattern Simulation using a small icon or placeholder -->
            <i class="bi bi-grid-3x3 text-[18px] text-[#343a40] dark:text-white"></i>
        </div>

        <!-- Swatch 3: Solid Dark Blue -->
        <div class="w-[32px] h-[32px] rounded-full border-2 border-gray-300 dark:border-gray-700 bg-[#1e3a8a] cursor-pointer transition duration-150 shadow-sm hover:ring-2 ring-[#1e3a8a]"></div>

        <!-- Swatch 4: Black -->
        <div class="w-[32px] h-[32px] rounded-full border-2 border-gray-300 dark:border-gray-700 bg-black cursor-pointer transition duration-150 shadow-sm hover:ring-2 ring-[#000]"></div>
    </div>

    <!-- Price -->
    <div class="text-[24px] font-bold text-[#ef4444] dark:text-[#f87171]">
        79 £
    </div>

    <!-- Placeholder for Image (As per rule requirement) -->
    <div class="mt-[30px] text-center">
        <img src="/product.png" alt="Product View" class="w-full max-w-xs mx-auto object-contain border border-gray-200 dark:border-gray-700 p-[4px] bg-[#f8f9fa] dark:bg-[#1a202c]">
    </div>

</div>
