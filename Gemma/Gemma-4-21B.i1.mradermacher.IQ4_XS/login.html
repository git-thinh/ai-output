<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <!-- Link to Tailwind CSS (Using CDN for simplicity) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Link to Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        /* Custom styles to ensure smooth transitions without JS */
        input:focus+i {
            color: #3b82f6;
            /* blue-500 */
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 text-blue-600 rounded-full mb-4">
                <i class="bi bi-person-fill text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-900">Welcome Back</h1>
            <p class="text-slate-500 text-sm">Please enter your details to login</p>
        </div>

        <form action="#" method="POST" class="space-y-5">
            <!-- Email Field -->
            <div class="relative group">
                <label class="block text-sm font-medium text-slate-700 mb-1 ml-1">Email Address</label>
                <div class="relative">
                    <div
                        class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-400 group-focus-within:text-blue-500">
                        <i class="bi bi-envelope"></i>
                    </div>
                    <input type="email" placeholder="name@company.com"
                        class="block w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-lg text-slate-900 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                </div>
            </div>

            <!-- Password Field -->
            <div class="relative group">
                <label class="block text-sm font-medium text-slate-700 mb-1 ml-1">Password</label>
                <div class="relative">
                    <div
                        class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-400 group-focus-within:text-blue-500">
                        <i class="bi bi-lock"></i>
                    </div>
                    <input type="password" placeholder="••••••••"
                        class="block w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-lg text-slate-900 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                </div>
            </div>

            <!-- Remember Me & Forgot Password -->
            <div class="flex items-center justify-between mt-2">
                <div class="flex items-center">
                    <input id="remember_me" type="checkbox"
                        class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500">
                    <label for="remember_me" class="ml-2 text-sm text-slate-600 select-none cursor-pointer">Remember
                        me</label>
                </div>
                <a href="#" class="text-sm text-blue-600 hover:underline decoration-blue-700">Forgot password?</a>
            </div>

            <!-- Submit Button -->
            <button type="submit"
                class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg shadow transition duration-200 ease-in-out">
                Sign In
            </button>
        </form>

        <!-- Footer Link -->
        <p class="text-center text-sm text-slate-500 mt-8">
            Don't have an account?
            <a href="#" class="font-semibold text-blue-600 hover:underline">Create account</a>
        </p>
    </div>

</body>

</html>
