<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudDrive - Dashboard</title>
    <!-- Link to Tailwind CSS (Using CDN for simplicity) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Link to Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        /* Customizing Tailwind v4 feel via standard CSS if needed */
        body { background-color: #f8f9fa; }
    </style>
</head>
<body class="text-slate-900 bg-gray-50 font-sans antialiased">

    <div class="flex h-screen overflow-hidden">
        
        <!-- SIDEBAR -->
        <aside class="w-64 bg-white border-r flex flex-col shrink-0">
            <div class="p-6 flex items-center gap-3 text-blue-600">
                <i class="bi bi-cloud-fill text-3xl"></i>
                <span class="font-bold text-xl tracking-tight">CloudDrive</span>
            </div>
            
            <nav class="flex-1 px-4 space-y-2 mt-4">
                <a href="#" class="flex items-center gap-3 px-3 py-2 text-blue-600 bg-blue-50 rounded-lg font-medium">
                    <i class="bi bi-folder2-open"></i> My Files
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition">
                    <i class="bi bi-star"></i> Starred
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition">
                    <i class="bi bi-trash"></i> Trash
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition">
                    <i class="bi bi-person-circle"></i> Shared with me
                </a>
            </nav>

            <div class="p-4 border-t mt-auto">
                <div class="flex items-center gap-3 p-2 text-gray-500">
                    <i class="bi bi-gear"></i> <span>Settings</span>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT AREA -->
        <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
            
            <!-- TOP HEADER / SEARCH BAR -->
            <header class="h-16 bg-white border-b flex items-center justify-between px-8 shrink-0">
                <div class="flex items-center flex-1 mr-4">
                    <div class="relative w-full max-w-md">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                            <i class="bi bi-search text-gray-400"></i>
                        </span>
                        <input type="text" class="block w-full pl-10 pr-3 py-2 border-none bg-gray-100 rounded-full focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="Search files and folders...">
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 shadow-sm transition">
                        <i class="bi bi-plus-lg"></i> New
                    </button>
                    <div class="w-10 h-10 rounded-full bg-blue-200 flex items-center justify-center text-blue-700 font-bold cursor-pointer">
                        JD
                    </div>
                </div>
            </header>

            <!-- TOOLBAR & BREADCRUMB -->
            <section class="px-8 py-4 bg-white border-b flex items-center justify-between">
                <div class="flex items-center text-sm text-gray-600">
                    <i class="bi bi-house-door mr-2"></i>
                    <a href="#" class="hover:text-blue-600">Home</a>
                    <i class="bi bi-chevron-right mx-2 text-xs"></i>
                    <a href="#" class="hover:text-blue-600">Documents</a>
                    <i class="bi bi-chevron-right mx-2 text-xs"></i>
                    <span class="font-semibold text-slate-900">Project_Alpha</span>
                </div>

                <div class="flex items-center gap-3 ml-auto">
                    <button class="p-2 hover:bg-gray-100 rounded-md"><i class="bi bi-grid-fill"></i></button>
                    <button class="p-2 bg-gray-100 rounded-md text-blue-600"><i class="bi bi-list-ul"></i></button>
                    <button class="p-2 hover:bg-gray-100 rounded-md"><i class="bi bi-arrow-repeat"></i></button>
                </div>
            </section>

            <!-- FILE GRID / CONTENT -->
            <section class="flex-1 overflow-y-auto p-8">
                
                <!-- Folder Item 1 -->
                <div class="group flex flex-col items-center w-32 p-4 rounded-xl hover:bg-blue-50 cursor-pointer transition duration-200">
                    <i class="bi bi-folder-fill text-5xl text-yellow-500 group-hover:text-yellow-600"></i>
                    <span class="mt-2 text-sm font-medium truncate w-full text-center">Marketing Assets</span>
                </div>

                <!-- Folder Item 2 -->
                <div class="group flex flex-col items-center w-32 p-4 rounded-xl hover:bg-blue-50 cursor-pointer transition duration-200">
                    <i class="bi bi-folder-fill text-5xl text-yellow-500 group-hover:text-yellow-600"></i>
                    <span class="mt-2 text-sm font-medium truncate w-full text-center">Invoices</span>
                </div>

                <!-- File Item 1 (Image) -->
                <div class="group flex flex-col items-center w-32 p-4 rounded-xl hover:bg-blue-50 cursor-pointer transition duration-200">
                    <div class="w-12 h-12 bg-gray-200 rounded flex items-center justify-center mb-2">
                        <i class="bi bi-image text-3xl text-gray-500"></i>
                    </div>
                    <span class="mt-2 text-sm font-medium truncate w-full text-center">Logo_Final.png</span>
                </div>

                <!-- File Item 2 (PDF) -->
                <div class="group flex flex-col items-center w-32 p-4 rounded-xl hover:bg-blue-50 cursor-pointer transition duration-200">
                    <div class="w-12 h-12 bg-red-100 rounded flex items-center justify-center mb-2">
                        <i class="bi bi-file-earmark-pdf text-3xl text-red-600"></i>
                    </div>
                    <span class="mt-2 text-sm font-medium truncate w-full text-center">Contract.pdf</span>
                </div>

                <!-- File Item 3 (Doc) -->
                <div class="group flex flex-col items-center w-32 p-4 rounded-xl hover:bg-blue-50 cursor-pointer transition duration-200">
                    <div class="w-12 h-12 bg-blue-100 rounded flex items-center justify-center mb-2">
                        <i class="bi bi-file-earmark-word text-3xl text-blue-600"></i>
                    </div>
                    <span class="mt-2 text-sm font-medium truncate w-full text-center">Meeting_Notes.docx</span>
                </div>

                 <!-- File Item 4 (Zip) -->
                 <div class="group flex flex-col items-center w-32 p-4 rounded-xl hover:bg-blue-50 cursor-pointer transition duration-200">
                    <div class="w-12 h-12 bg-orange-100 rounded flex items-center justify-center mb-2">
                        <i class="bi bi-archive text-3xl text-orange-600"></i>
                    </div>
                    <span class="mt-2 text-sm font-medium truncate w-full text-center">Backup_v1.zip</span>
                </div>

            </section>

        </main>
    </div>

</body>
</html>
