<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Drive Dashboard - Tổng quan</title>
    <!-- Tailwind CSS v4 setup (assuming setup is done via build process) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styling for better visual separation and card effects */
        .card {
            @apply bg-white p-6 rounded-xl shadow-lg transition duration-300 ease-in-out;
        }
        /* Custom style for file tree lines */
        .file-tree-line {
            @apply h-1 bg-gray-200 my-1;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans antialiased">

    <!-- Header/Navigation Bar -->
    <header class="bg-white shadow-md sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <h1 class="text-3xl font-bold text-gray-800 flex items-center">
                <i class="bi bi-cloud-upload text-blue-600 mr-3 text-4xl"></i>
                Cloud Drive
            </h1>
            <nav class="space-x-6 hidden md:flex">
                <a href="#" class="text-gray-600 hover:text-blue-600 font-medium transition duration-150">
                    <i class="bi bi-house-door text-gray-700 mr-1"></i> Trang Chủ
                </a>
                <a href="#" class="text-gray-600 hover:text-blue-600 font-medium transition duration-150">
                    <i class="bi bi-folder text-gray-700 mr-1"></i> Các Thư Mục
                </a>
                <a href="#" class="text-gray-600 hover:text-blue-600 font-medium transition duration-150">
                    <i class="bi bi-gear text-gray-700 mr-1"></i> Cài Đặt
                </a>
            </nav>
            <div class="flex items-center space-x-4">
                <button class="p-2 rounded-full text-gray-600 hover:bg-gray-100 transition">
                    <i class="bi bi-bell text-xl text-gray-500"></i>
                </button>
                <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-semibold border-2 border-blue-500">
                    JD
                </div>
            </div>
        </div>
    </header>

    <!-- Main Dashboard Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

        <!-- Action Panel (Create New Item) -->
        <div class="mb-8">
            <div class="card border-t-4 border-blue-500">
                <h2 class="text-2xl font-semibold text-gray-800 mb-4 flex items-center">
                    <i class="bi bi-plus-circle-fill text-blue-600 mr-2 text-3xl"></i>
                    Tạo Nội Dung Mới
                </h2>
                <form class="space-y-4">
                    <div>
                        <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Tên Thư Mục/Tập Tin</label>
                        <input type="text" id="name" placeholder="Nhập tên thư mục hoặc tập tin" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 transition duration-150">
                    </div>
                    <div>
                        <label for="type" class="block text-sm font-medium text-gray-700 mb-1">Loại Đối Tượng</label>
                        <select id="type" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 transition duration-150">
                            <option value="folder">Thư Mục (Folder)</option>
                            <option value="file">Tập Tin (File)</option>
                        </select>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition duration-150 flex items-center justify-center mt-4">
                        <i class="bi bi-upload mr-2"></i> Tải Lên Cloud
                    </button>
                </form>
            </div>
        </div>

        <!-- File Structure Overview -->
        <div class="card">
            <h2 class="text-2xl font-semibold text-gray-800 mb-5 flex items-center border-b pb-3">
                <i class="bi bi-folder-fill text-green-600 mr-2 text-3xl"></i>
                Cấu Trúc Thư Mục Hiện Tại
            </h2>
            
            <!-- File Tree Visualization -->
            <div class="space-y-4">
                <!-- Root Folder -->
                <div class="flex items-start">
                    <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold flex-shrink-0 mt-1">
                        D
                    </div>
                    <div class="ml-4">
                        <p class="text-lg font-medium text-gray-800 mb-1">My Documents</p>
                        <!-- Root Folder Line -->
                        <div class="file-tree-line w-1 bg-gray-200"></div>
                        <!-- Sub-Folder 1 -->
                        <div class="flex items-start">
                            <div class="w-8 h-8 bg-green-100 rounded-full flex items-center justify-center text-green-600 font-bold flex-shrink-0 mt-1">
                                F
                            </div>
                            <div class="ml-4">
                                <p class="text-base font-medium text-gray-700 mb-1">Project Alpha</p>
                                <!-- Folder Line -->
                                <div class="file-tree-line w-1 bg-gray-200"></div>
                                <!-- File 1 -->
                                <div class="flex items-start">
                                    <div class="w-8 h-8 bg-yellow-100 rounded-full flex items-center justify-center text-yellow-600 font-bold flex-shrink-0 mt-1">
                                        D
                                    </div>
                                    <div class="ml-4">
                                        <p class="text-sm font-medium text-gray-700">Report.pdf</p>
                                        <!-- File Line -->
                                        <div class="file-tree-line w-1 bg-gray-200"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- Sub-Folder 2 -->
                        <div class="flex items-start">
                            <div class="w-8 h-8 bg-red-100 rounded-full flex items-center justify-center text-red-600 font-bold flex-shrink-0 mt-1">
                                D
                            </div>
                            <div class="ml-4">
                                <p class="text-base font-medium text-gray-700">Images</p>
                                <!-- Folder Line -->
                                <div class="file-tree-line w-1 bg-gray-200"></div>
                                <!-- File 2 -->
                                <div class="flex items-start">
                                    <div class="w-8 h-8 bg-purple-100 rounded-full flex items-center justify-center text-purple-600 font-bold flex-shrink-0 mt-1">
                                        F
                                    </div>
                                    <div class="ml-4">
                                        <p class="text-sm font-medium text-gray-700">Photo_01.jpg</p>
                                        <!-- File Line -->
                                        <div class="file-tree-line w-1 bg-gray-200"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

</body>
</html>
