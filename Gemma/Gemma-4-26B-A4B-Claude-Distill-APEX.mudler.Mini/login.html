<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | App</title>
  <!-- Tailwind CSS v4 -->
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6 font-sans text-slate-900">

  <div class="w-full max-w-[420px]">
    <!-- Card Container -->
    <form action="/login" method="POST" class="bg-white border border-slate-200 px-8 py-10 rounded-xl shadow-sm ring-1 ring-black/[0.05] focus-within:ring-blue-500 transition duration-200 ease-in-out">
      
      <!-- Header Section -->
      <header class="text-center mb-8 space-y-2">
        <span class="inline-flex h-12 w-12 bg-blue-600 text-white items-center justify-center rounded-lg text-xl mb-4">
          <i class="bi bi-lightning-charge-fill"></i>
        </span>
        <h1 class="text-2xl font-bold tracking-tight">Welcome back</h1>
        <p class="text-slate-500 text-sm">Enter your details to access your account.</p>
      </header>

      <!-- Form Fields -->
      <div class="space-y-5">
        <div>
          <label for="email" class="block text-xs font-semibold uppercase tracking-wider text-slate-700 mb-1 ml-1">Email Address</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-3 pt-1 pb-1 pointer-events-none text-slate-400 group-focus-within:text-blue-600 transition-colors">
              <i class="bi bi-envelope fs-5"></i>
            </div>
            <input type="email" id="email" name="email" required placeholder="name@company.com" 
                   class="w-full block pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all text-sm"></textarea></input>
          </div>
        </div>

        <div>
          <div class="flex items-baseline justify-between mb-1">
            <label for="password" class="text-xs font-semibold uppercase tracking-wider text-slate-700 ml-1">Password</label>
            <a href="#" class="text-[11px] font-medium text-blue-600 hover:underline decoration-dotted underline-offset-2">Forgot password?</a>
          </div>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-3 pt-1 pb-1 pointer-events-none text-slate-400 group-focus-within:text-blue-600 transition-colors">
              <i class="bi bi-lock fs-5"></i>
            </div>
            <input type="password" id="password" name="password" required placeholder="••••••••" 
                   class="w-full block pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all text-sm"></input>
          </div>
        </div>

        <!-- Remember Me -->
        <div class="flex items-center gap-2 px-1">
          <input type="checkbox" id="remember" name="remember" class="h-4 w-4 accent-blue-600 cursor-pointer"></input>
          <label for="remember" class="text-xs text-slate-600 select-none cursor-pointer">Remember this device.</label>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="w-full flex items-center justify-center gap-2 h-11 bg-slate-900 text-white font-bold rounded-lg shadow-md active:scale-[0.98] transition duration-100 mt-2">
          Sign in <span><i class="bi bi-arrow-right ms-1"></i></span>
        </button>
      </div>

      <!-- Divider -->
      <div class="my-6 relative before:content-[''] before:absolute before:inset-x-0 before:top-1/2 before:h-px before:bg-slate-200">
         <span class="relative z-10 inline-block px-3 bg-white text-[10px] uppercase tracking-widest font-semibold text-slate-400 leading-tight">Or continue with</span>
      </div>

      <!-- Social Login Buttons -->
      <div class="grid grid-cols-2 gap-3 mb-7">
        <a href="#" class="inline-flex items-center justify-center gap-2 p-2.5 border border-slate-200 rounded-lg hover:bg-slate-50 transition text-sm font-medium">
           <img src="https://www.google.com/s2/favicons?domain=github.com&sz=32" alt="" width="16" height="16"></img>
           GitHub
        </a>
        <a href="#" class="inline-flex items-center justify-center gap-2 p-2.5 border border-slate-200 rounded-lg hover:bg-slate-50 transition text-sm font-medium">
           <img src="https://www.google.com/s2/favicons?domain=linkedin.com&sz=32" alt="" width="16" height="16"></img>
           LinkedIn
        </a>
      </div>

      <!-- Footer Link -->
      <p class="text-center text-xs text-slate-500 pt-2">
        Don't have an account? 
        <a href="/register" class="font-bold text-blue-600 underline decoration-transparent hover:decoration-blue-600 transition-all">Create one for free.</a>
      </p>
    </form>

    <!-- Bottom Info -->
    <footer class="mt-8 flex items-center justify-between opacity-60 grayscale contrast-125 scale-90 origin-left pointer-events-none select-none">
       <small>&copy; 2025 App Inc.</small>
       <div class="flex gap-4 text-[10px]">
          <span>Privacy</span>
          <span>Terms</span>
       </div>
    </footer>
  </div>

</body>
</html>
