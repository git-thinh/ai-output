<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudDrive Clone - Dashboard</title>
    <!-- Tailwind CSS v4 -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        /* Custom scrollbar styling for better aesthetics */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            /* Slate-300 */
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
            /* Slate-400 */
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 antialiased h-screen overflow-hidden">

    <!-- Main Application Container -->
    <div class="flex h-full">

        <!-- 1. Sidebar Navigation (Fixed Width) -->
        <aside
            class="w-64 bg-white border-r border-gray-200 flex flex-col shadow-xl z-20 transition-transform duration-300 ease-in-out">

            <!-- Logo / App Name -->
            <div class="p-6 border-b border-gray-100">
                <h1 class="text-2xl font-bold text-blue-600 flex items-center">
                    <i class="bi bi-cloud-arrow-up mr-2 text-3xl"></i> CloudDrive
                </h1>
            </div>

            <!-- Navigation Menu -->
            <nav class="flex-grow p-4 space-y-2 overflow-y-auto">

                <!-- Folder Item 1 (Active) -->
                <a href="#"
                    class="flex items-center p-3 rounded-lg bg-blue-100 text-blue-700 font-semibold transition duration-150 hover:bg-blue-200">
                    <i class="bi bi-folder-fill w-5 mr-3"></i> My Drive
                </a>

                <!-- Folder Item 2 -->
                <a href="#"
                    class="flex items-center p-3 rounded-lg text-gray-600 hover:bg-gray-100 transition duration-150">
                    <i class="bi bi-folder w-5 mr-3"></i> Documents
                </a>

                <!-- Folder Item 3 -->
                <a href="#"
                    class="flex items-center p-3 rounded-lg text-gray-600 hover:bg-gray-100 transition duration-150">
                    <i class="bi bi-folder w-5 mr-3"></i> Photos & Videos
                </a>

                <!-- Folder Item 4 -->
                <a href="#"
                    class="flex items-center p-3 rounded-lg text-gray-600 hover:bg-gray-100 transition duration-150">
                    <i class="bi bi-folder w-5 mr-3"></i> Shared Drives
                </a>

                <!-- Separator -->
                <div class="border-t border-gray-100 my-4"></div>

                <!-- Settings/Profile Section -->
                <div class="pt-4 border-t border-gray-100">
                    <a href="#"
                        class="flex items-center p-3 rounded-lg text-gray-600 hover:bg-gray-100 transition duration-150">
                        <i class="bi bi-person-circle w-5 mr-3"></i> Profile
                    </a>
                    <a href="#"
                        class="flex items-center p-3 rounded-lg text-gray-600 hover:bg-gray-100 transition duration-150">
                        <i class="bi bi-box-arrow-right w-5 mr-3"></i> Logout
                    </a>
                </div>
            </nav>
        </aside>

        <!-- 2. Main Content Area -->
        <main class="flex-grow flex flex-col overflow-hidden">

            <!-- Top Header Bar -->
            <header class="bg-white shadow-md p-4 flex justify-between items-center z-10">

                <!-- Search Bar -->
                <div class="relative w-96">
                    <input type="text" placeholder="Tìm kiếm tập tin và thư mục..."
                        class="w-full py-2 pl-10 pr-4 border border-gray-300 rounded-full focus:ring-blue-500 focus:border-blue-500 transition duration-150">
                    <i class="bi bi-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                </div>

                <!-- Action Buttons -->
                <div class="flex space-x-4">
                    <button
                        class="bg-blue-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-blue-700 transition duration-150 flex items-center">
                        <i class="bi bi-plus-circle mr-2"></i> New Folder
                    </button>
                    <button
                        class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg font-medium hover:bg-gray-300 transition duration-150 flex items-center">
                        <i class="bi bi-download mr-2"></i> Download
                    </button>
                </div>
            </header>

            <!-- File/Folder Display Area -->
            <section class="flex-grow p-8 overflow-y-auto">
                <h2 class="text-3xl font-semibold mb-6 text-gray-700">My Drive</h2>

                <!-- File/Folder Grid Simulation -->
                <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">

                    <!-- Folder Card 1 -->
                    <div
                        class="bg-white rounded-xl shadow-lg overflow-hidden hover:shadow-xl transition duration-300 cursor-pointer group">
                        <div class="p-4 flex flex-col items-center text-center">
                            <i class="bi bi-folder-fill text-4xl text-yellow-500 mb-3"></i>
                            <p class="font-medium truncate w-full text-sm">Project Alpha</p>
                            <span class="text-xs text-gray-500 mt-1">3 Files</span>
                        </div>
                    </div>

                    <!-- Folder Card 2 -->
                    <div
                        class="bg-white rounded-xl shadow-lg overflow-hidden hover:shadow-xl transition duration-300 cursor-pointer group">
                        <div class="p-4 flex flex-col items-center text-center">
                            <i class="bi bi-folder-fill text-4xl text-green-500 mb-3"></i>
                            <p class="font-medium truncate w-full text-sm">Work Files 2024</p>
                            <span class="text-xs text-gray-500 mt-1">12 Files</span>
                        </div>
                    </div>

                    <!-- Folder Card 3 -->
                    <div
                        class="bg-white rounded-xl shadow-lg overflow-hidden hover:shadow-xl transition duration-300 cursor-pointer group">
                        <div class="p-4 flex flex-col items-center text-center">
                            <i class="bi bi-folder-fill text-4xl text-purple-500 mb-3"></i>
                            <p class="font-medium truncate w-full text-sm">Personal Photos</p>
                            <span class="text-xs text-gray-500 mt-1">45 Images</span>
                        </div>
                    </div>

                    <!-- Folder Card 4 -->
                    <div
                        class="bg-white rounded-xl shadow-lg overflow-hidden hover:shadow-xl transition duration-300 cursor-pointer group">
                        <div class="p-4 flex flex-col items-center text-center">
                            <i class="bi bi-folder-fill text-4xl text-red-500 mb-3"></i>
                            <p class="font-medium truncate w-full text-sm">Archive</p>
                            <span class="text-xs text-gray-500 mt-1">8 Items</span>
                        </div>
                    </div>

                    <!-- File Card 1 (Example) -->
                    <div
                        class="bg-white rounded-xl shadow-lg overflow-hidden hover:shadow-xl transition duration-300 cursor-pointer group">
                        <div class="p-4 flex flex-col justify-between h-full">
                            <div>
                                <i class="bi bi-file-earmark-text text-4xl text-indigo-500 mb-3"></i>
                                <p class="font-medium truncate text-sm">Report_Q3.pdf</p>
                            </div>
                            <div class="mt-auto pt-2 border-t border-gray-100 flex justify-between items-center">
                                <span class="text-xs text-gray-500">PDF</span>
                                <i class="bi bi-download text-blue-500"></i>
                            </div>
                        </div>
                    </div>

                    <!-- File Card 2 (Example) -->
                    <div
                        class="bg-white rounded-xl shadow-lg overflow-hidden hover:shadow-xl transition duration-300 cursor-pointer group">
                        <div class="p-4 flex flex-col justify-between h-full">
                            <div>
                                <i class="bi bi-file-earmark-image text-4xl text-pink-500 mb-3"></i>
                                <p class="font-medium truncate text-sm">Vacation_Pic_01.jpg</p>
                            </div>
                            <div class="mt-auto pt-2 border-t border-gray-100 flex justify-between items-center">
                                <span class="text-xs text-gray-500">Image</span>
                                <i class="bi bi-download text-blue-500"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

        </main>
    </div>

</body>

</html>
