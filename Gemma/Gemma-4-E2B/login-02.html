<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Page Login</title>
    <!-- Link to Tailwind CSS (Using CDN for simplicity) -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Link to Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Custom Configuration for Tailwind (Optional: Setting up a dark theme base) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'terminal-bg': '#1a202c', // Dark background similar to a terminal
                        'terminal-green': '#48bb78', // Accent color
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-900 min-h-screen flex items-center justify-center p-4 font-mono text-gray-200">

    <!-- Login Card Container -->
    <div class="w-full max-w-md bg-gray-800 p-8 rounded-xl shadow-2xl border border-gray-700 transform transition duration-500 hover:shadow-terminal-green/30">
        
        <!-- Header Section -->
        <header class="text-center mb-8">
            <i class="bi bi-code-slash text-6xl text-terminal-green mb-3"></i>
            <h1 class="text-3xl font-bold text-white tracking-wider uppercase">System Access</h1>
            <p class="text-sm text-gray-400 mt-1">Enter your credentials to access the code repository.</p>
        </header>

        <!-- Login Form -->
        <form action="#" method="POST" class="space-y-6">
            
            <!-- Username/Email Field -->
            <div>
                <label for="username" class="block text-sm font-medium text-gray-300 mb-2 flex items-center">
                    <i class="bi bi-person-fill mr-2 text-terminal-green"></i> Username / Email
                </label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="user@example.com"
                    class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-terminal-green focus:border-terminal-green text-white placeholder-gray-400 transition duration-200"
                    required
                >
            </div>

            <!-- Password Field -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-300 mb-2 flex items-center">
                    <i class="bi bi-lock-fill mr-2 text-terminal-green"></i> Password
                </label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="••••••••"
                    class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-terminal-green focus:border-terminal-green text-white placeholder-gray-400 transition duration-200"
                    required
                >
            </div>

            <!-- Remember Me / Forgot Password (Optional static elements) -->
            <div class="flex justify-between items-center pt-2">
                <div class="flex items-center">
                    <input id="remember_me" type="checkbox" class="h-4 w-4 text-terminal-green border-gray-600 rounded focus:ring-terminal-green">
                    <label for="remember_me" class="ml-2 block text-sm text-gray-400">Remember me</label>
                </div>
                <a href="#" class="text-sm text-terminal-green hover:text-white transition duration-150">Forgot Password?</a>
            </div>


            <!-- Submit Button -->
            <div>
                <button 
                    type="submit" 
                    class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-md text-base font-semibold text-white bg-terminal-green hover:bg-green-600 focus:outline-none focus:ring-4 focus:ring-terminal-green focus:ring-opacity-50 transition duration-300 transform hover:scale-[1.01]"
                >
                    <i class="bi bi-box-arrow-in-right mr-2"></i> Login to Code Page
                </button>
            </div>
        </form>

    </div>

</body>
</html>
