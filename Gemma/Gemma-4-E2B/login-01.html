<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập</title>
    <!-- 
        Trong môi trường thực tế, bạn sẽ cần link đến file CSS đã được biên dịch của Tailwind.
        Vì đây là code tĩnh, tôi giả định bạn đang dùng CDN hoặc đã build project.
        Nếu bạn dùng Tailwind CLI/PostCSS, hãy đảm bảo class này hoạt động.
    -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Link Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <!-- Login Card Container -->
    <div class="w-full max-w-md bg-white p-8 rounded-xl shadow-2xl border border-gray-200">
        
        <div class="flex flex-col items-center mb-8">
            <i class="bi bi-box-se븐 text-5xl text-indigo-600 mb-3"></i> <!-- Icon placeholder (dùng icon từ Bootstrap) -->
            <h2 class="text-3xl font-bold text-gray-800">Đăng Nhập</h2>
        </div>

        <form action="#" method="POST" class="space-y-6">
            
            <!-- Email Input Field -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="bi bi-envelope text-gray-400"></i>
                    </div>
                    <input 
                        id="email" 
                        name="email" 
                        type="email" 
                        placeholder="ten@example.com" 
                        required
                        class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 transition duration-150 ease-in-out shadow-sm"
                    >
                </div>
            </div>

            <!-- Password Input Field -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="bi bi-lock-fill text-gray-400"></i>
                    </div>
                    <input 
                        id="password" 
                        name="password" 
                        type="password" 
                        placeholder="Nhập mật khẩu" 
                        required
                        class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 transition duration-150 ease-in-out shadow-sm"
                    >
                </div>
            </div>

            <!-- Remember Me / Forgot Password -->
            <div class="flex items-center justify-between pt-2">
                <div class="flex items-center">
                    <input id="remember_me" name="remember_me" type="checkbox" class="h-4 w-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                    <label for="remember_me" class="ml-2 block text-sm text-gray-900">Ghi nhớ tôi</label>
                </div>
                <a href="#" class="text-sm font-medium text-indigo-600 hover:text-indigo-500 transition duration-150">Quên mật khẩu?</a>
            </div>

            <!-- Submit Button -->
            <div>
                <button 
                    type="submit" 
                    class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-md text-lg font-semibold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-150 ease-in-out transform hover:scale-[1.01]"
                >
                    <i class="bi bi-box-arrow-in-right mr-2"></i> Đăng Nhập
                </button>
            </div>
        </form>
    </div>

</body>
</html>
