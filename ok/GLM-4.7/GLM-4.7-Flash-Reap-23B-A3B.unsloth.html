<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Drive - Nuxt 4 Prototype</title>

    <!-- 1. Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- 2. Tailwind CSS v4 (JIT Mode via CDN for prototype) -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Cấu hình Tailwind để sử dụng Bootstrap Icons -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#64748b',
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Scrollbar cho đẹp hơn */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Animation cho Modal */
        .modal-enter-active, .modal-leave-active {
            transition: opacity 0.3s ease;
        }
        .modal-enter-from, .modal-leave-to {
            opacity: 0;
        }
        
        /* Hiệu ứng khi drop file vào zone */
        .drag-active {
            border-color: #3b82f6;
            background-color: #e0f2fe;
        }
    </style>
</head>
<body class="bg-slate-100 font-sans min-h-screen text-slate-800 antialiased">

    <!-- Layout Container -->
    <div class="flex h-screen overflow-hidden">
        
        <!-- Sidebar (Thư mục Tree) -->
        <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col border-r border-slate-800 hidden md:flex">
            <!-- Sidebar Header -->
            <div class="p-5 border-b border-slate-800">
                <h2 class="text-xl font-bold text-white flex items-center gap-2">
                    <i class="bi bi-cloud-fill"></i>
                    My Cloud
                </h2>
            </div>

            <!-- Sidebar Content (Tree View) -->
            <nav class="flex-1 overflow-y-auto p-3 space-y-1">
                <!-- Root Item -->
                <div class="flex items-center gap-3 px-3 py-2 hover:bg-slate-800 rounded cursor-pointer text-white">
                    <i class="bi bi-files"></i>
                    <span class="font-medium">All Files</span>
                </div>
                
                <!-- Sub Items -->
                <div class="pl-6 space-y-1">
                    <div class="flex items-center gap-3 px-3 py-2 hover:bg-slate-800 rounded cursor-pointer text-slate-400">
                        <i class="bi bi-folder"></i>
                        <span>Documents</span>
                    </div>
                    <div class="flex items-center gap-3 px-3 py-2 hover:bg-slate-800 rounded cursor-pointer text-slate-400">
                        <i class="bi bi-folder"></i>
                        <span>Images</span>
                    </div>
                    <div class="flex items-center gap-3 px-3 py-2 hover:bg-slate-800 rounded cursor-pointer text-slate-400">
                        <i class="bi bi-folder"></i>
                        <span>Downloads</span>
                    </div>
                </div>
            </nav>

            <!-- Sidebar Footer -->
            <div class="p-4 border-t border-slate-800 text-xs text-center text-slate-500">
                Nuxt 4 Prototype v1.0
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col bg-white overflow-hidden">
            
            <!-- Header -->
            <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 shadow-sm">
                <div class="flex items-center gap-4">
                    <div class="md:hidden text-slate-600">
                        <i class="bi bi-list"></i>
                    </div>
                    <h1 class="font-bold text-lg text-slate-700">My Drive</h1>
                </div>

                <!-- Search Bar -->
                <div class="flex-1 max-w-md">
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                            <i class="bi bi-search"></i>
                        </span>
                        <input type="text" placeholder="Search files and folders..." 
                            class="w-full py-2 pl-10 pr-4 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                    </div>
                </div>

                <!-- Actions -->
                <div class="flex items-center gap-3">
                    <button onclick="openModal('createFolderModal')" class="flex items-center gap-2 px-3 py-1.5 bg-blue-50 text-primary rounded hover:bg-blue-100 transition-colors border border-blue-200 text-sm font-medium">
                        <i class="bi bi-folder-plus"></i>
                        New Folder
                    </button>
                    <button class="flex items-center gap-2 px-3 py-1.5 bg-slate-50 text-slate-600 rounded hover:bg-slate-100 transition-colors border border-slate-200 text-sm font-medium">
                        <i class="bi bi-person-circle"></i>
                        Profile
                    </button>
                </div>
            </header>

            <!-- Content Area -->
            <div class="flex-1 overflow-y-auto p-6">
                <!-- Breadcrumbs -->
                <div class="flex items-center gap-2 text-sm text-slate-500 mb-4">
                    <span>Home</span>
                    <i class="bi bi-chevron-right text-xs"></i>
                    <span class="text-primary font-semibold">All Files</span>
                </div>

                <!-- Grid Layout -->
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    
                    <!-- Template for File Card -->
                    <div id="fileContainer" class="contents">
                        <!-- Javascript sẽ render file vào đây -->
                    </div>

                </div>
            </div>
        </main>
    </div>

    <!-- Modal: Create Folder -->
    <div id="createFolderModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm hidden">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-6 transform transition-all scale-100">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-lg text-slate-800">New Folder</h3>
                <button onclick="closeModal('createFolderModal')" class="text-slate-400 hover:text-slate-600">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Folder Name</label>
                    <input type="text" id="newFolderName" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="My Folder">
                </div>
                <div class="flex justify-end gap-2 mt-6">
                    <button onclick="closeModal('createFolderModal')" class="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded">Cancel</button>
                    <button onclick="handleCreateFolder()" class="px-4 py-2 text-sm bg-primary text-white rounded hover:bg-blue-600">Create</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Upload Zone (Overlay) -->
    <div id="uploadModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm hidden">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg p-8 text-center">
            <div class="w-16 h-16 bg-blue-100 text-primary rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="bi bi-cloud-arrow-up text-3xl"></i>
            </div>
            <h3 class="font-bold text-lg text-slate-800 mb-2">Upload Files</h3>
            <p class="text-slate-500 mb-6">Drag and drop files here or click to browse.</p>
            
            <div class="flex justify-center">
                <button onclick="closeModal('uploadModal')" class="px-6 py-2 bg-slate-100 text-slate-700 rounded-full hover:bg-slate-200 transition">Close</button>
            </div>
        </div>
    </div>

    <!-- JavaScript Logic (Vanilla JS cho prototype) -->
    <script>
        // 1. Mock Data
        const files = [
            { id: '1', name: 'Project_Specs.pdf', type: 'pdf', size: '2.4 MB', date: 'Oct 24, 2023' },
            { id: '2', name: 'Screenshot_001.png', type: 'image', size: '1.2 MB', date: 'Oct 25, 2023' },
            { id: '3', name: 'Meeting_Notes.docx', type: 'doc', size: '45 KB', date: 'Oct 26, 2023' },
            { id: '4', name: 'budget_2024.xlsx', type: 'sheet', size: '12 KB', date: 'Oct 27, 2023' },
            { id: '5', name: 'backup.zip', type: 'zip', size: '150 MB', date: 'Oct 28, 2023' },
            { id: '6', name: 'photo_gallery/', type: 'folder', size: '-', date: 'Nov 01, 2023' },
            { id: '7', name: 'logo.svg', type: 'image', size: '12 KB', date: 'Nov 02, 2023' },
            { id: '8', name: 'notes.txt', type: 'doc', size: '1 KB', date: 'Nov 03, 2023' },
        ];

        // 2. Helper Functions
        function getFileIcon(type) {
            switch(type) {
                case 'pdf': return '<i class="bi bi-file-earmark-pdf-fill text-red-500"></i>';
                case 'image': return '<i class="bi bi-file-earmark-image-fill text-blue-500"></i>';
                case 'zip': return '<i class="bi bi-file-earmark-zip-fill text-yellow-500"></i>';
                case 'folder': return '<i class="bi bi-folder-fill text-yellow-400"></i>';
                default: return '<i class="bi bi-file-earmark text-slate-500"></i>';
            }
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // 3. Render Logic
        function renderFiles() {
            const container = document.getElementById('fileContainer');
            container.innerHTML = ''; // Clear

            files.forEach(file => {
                const card = document.createElement('div');
                
                // Dynamic styling based on type
                let bgClass = 'bg-white';
                if (file.type === 'folder') {
                    bgClass = 'bg-slate-50 border-slate-200 hover:bg-slate-100 border-dashed';
                }

                card.className = `group relative bg-white border border-slate-200 rounded-xl p-4 hover:shadow-lg transition-all cursor-pointer flex flex-col items-center justify-center hover:-translate-y-1`;
                
                card.innerHTML = `
                    <div class="w-12 h-12 rounded-full ${file.type === 'folder' ? 'bg-blue-100' : 'bg-slate-100'} flex items-center justify-center text-xl mb-3 group-hover:scale-110 transition-transform">
                        ${getFileIcon(file.type)}
                    </div>
                    <div class="text-center w-full">
                        <h4 class="text-sm font-semibold text-slate-700 truncate w-full mb-1">${file.name}</h4>
                        <p class="text-xs text-slate-400">${file.size}</p>
                    </div>
                    <!-- Hover Actions -->
                    <div class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button class="bg-white/80 backdrop-blur rounded-full p-1.5 hover:bg-white shadow-sm text-slate-500 hover:text-red-500">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 4. Modal Logic
        function openModal(modalId) {
            document.getElementById(modalId).classList.remove('hidden');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.add('hidden');
        }

        function handleCreateFolder() {
            const input = document.getElementById('newFolderName');
            const name = input.value.trim();
            if (name) {
                // Add to mock data
                files.unshift({
                    id: Date.now().toString(),
                    name: name,
                    type: 'folder',
                    size: '-',
                    date: 'Just now'
                });
                renderFiles();
                input.value = '';
                closeModal('createFolderModal');
            }
        }

        // 5. Drag and Drop Zone Logic (Simple implementation)
        const contentArea = document.querySelector('.flex-1.overflow-y-auto'); // Main scroll area
        
        contentArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            // Visual feedback
        });

        contentArea.addEventListener('drop', (e) => {
            e.preventDefault();
            closeModal('uploadModal');
            // Here you would handle the file upload logic
            alert('File dropped! (Logic to be implemented)');
        });

        // Init
        renderFiles();

    </script>
</body>
</html>
