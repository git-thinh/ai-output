<!DOCTYPE html>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<body class="bg-[#f7f7f7] dark:bg-[#1a1a1a] min-h-screen flex items-center justify-center p-4 transition-colors duration-300">

    <!-- Main Product Viewer Container -->
    <div class="w-full max-w-[600px] relative bg-white dark:bg-[#2c2c2c] shadow-xl rounded-lg overflow-hidden transition-colors duration-300">

        <!-- Header Controls (Top Bar) -->
        <div class="flex justify-between items-center p-4 pt-[20px] px-6 absolute top-0 left-0 right-0 z-10">
            <!-- Back Icon -->
            <button class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-[#3a3a3a] transition duration-150">
                <i class="bi bi-arrow-left text-xl text-gray-800 dark:text-white"></i>
            </button>
            <!-- Wishlist Icon -->
            <button class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-[#3a3a3a] transition duration-150">
                <i class="bi bi-heart text-xl text-gray-800 dark:text-white"></i>
            </button>
        </div>

        <!-- Product Image Area -->
        <div class="relative h-[65vh] flex items-center justify-center overflow-hidden bg-white dark:bg-[#2c2c2c]">
            
            <!-- Product Image Placeholder -->
            <img src="/product.png" alt="Product View" class="max-h-full max-w-full object-contain transition duration-300">

            <!-- Navigation Arrows -->
            <!-- Left Arrow -->
            <button class="absolute left-4 top-1/2 transform -translate-y-1/2 p-3 bg-white/70 dark:bg-[#1a1a1a]/70 backdrop-blur-sm rounded-full shadow-lg hover:bg-white dark:hover:bg-[#3a3a3a] transition z-20">
                <i class="bi bi-chevron-left text-2xl text-gray-800 dark:text-white"></i>
            </button>

            <!-- Right Arrow -->
            <button class="absolute right-4 top-1/2 transform -translate-y-1/2 p-3 bg-white/70 dark:bg-[#1a1a1a]/70 backdrop-blur-sm rounded-full shadow-lg hover:bg-white dark:hover:bg-[#3a3a3a] transition z-20">
                <i class="bi bi-chevron-right text-2xl text-gray-800 dark:text-white"></i>
            </button>

            <!-- Pagination Dots -->
            <div class="absolute bottom-4 flex space-x-2 z-20">
                <span class="w-2 h-2 bg-black rounded-full opacity-100 transition duration-300"></span>
                <span class="w-2 h-2 bg-gray-400 rounded-full opacity-50 transition duration-300"></span>
            </div>
        </div>

        <!-- Footer/Pagination Indicator (Redundant but matches structure) -->
        <div class="p-4 flex justify-center space-x-2 border-t border-gray-100 dark:border-[#444] bg-[#f7f7f7] dark:bg-[#2c2c2c]">
            <span class="w-2 h-2 bg-black rounded-full"></span>
            <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
        </div>

    </div>

</body>
</html>
