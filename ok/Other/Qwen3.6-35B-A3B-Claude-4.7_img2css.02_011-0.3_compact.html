<!DOCTYPE html>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<div class="min-h-screen bg-[#e5e7eb] dark:bg-[#0f0f0f] flex flex-col">
  <div class="flex-1 flex flex-col items-center justify-center relative">
    <div class="absolute top-[24px] left-[24px] w-[48px] h-[48px] rounded-full bg-white dark:bg-[#1a1a1a] flex items-center justify-center shadow-sm">
      <i class="bi bi-share text-[#374151] dark:text-[#d1d5db] text-[20px]"></i>
    </div>
    <div class="absolute top-[24px] right-[24px] w-[48px] h-[48px] rounded-full bg-white dark:bg-[#1a1a1a] flex items-center justify-center shadow-sm">
      <i class="bi bi-heart text-[#374151] dark:text-[#d1d5db] text-[20px]"></i>
    </div>
    <div class="absolute left-[24px] top-1/2 -translate-y-1/2 w-[48px] h-[48px] rounded-full bg-white dark:bg-[#1a1a1a] flex items-center justify-center shadow-sm">
      <i class="bi bi-chevron-left text-[#374151] dark:text-[#d1d5db] text-[20px]"></i>
    </div>
    <div class="absolute right-[24px] top-1/2 -translate-y-1/2 w-[48px] h-[48px] rounded-full bg-white dark:bg-[#1a1a1a] flex items-center justify-center shadow-sm">
      <i class="bi bi-chevron-right text-[#374151] dark:text-[#d1d5db] text-[20px]"></i>
    </div>
    <img src="/product.png" alt="Product" class="w-[320px] h-auto object-contain">
  </div>
  <div class="h-[64px] bg-white dark:bg-[#1a1a1a] flex items-center justify-center gap-[8px]">
    <div class="w-[8px] h-[8px] rounded-full bg-[#374151] dark:bg-[#d1d5db]"></div>
    <div class="w-[8px] h-[8px] rounded-full bg-transparent border border-[#9ca3af] dark:border-[#6b7280]"></div>
    <div class="w-[8px] h-[8px] rounded-full bg-transparent border border-[#9ca3af] dark:border-[#6b7280]"></div>
  </div>
</div>
