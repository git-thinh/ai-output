<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind V4 & Bootstrap Icons</title>
    
    <!-- 1. Tailwind CSS v4 -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

    <!-- 2. Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style type="text/tw" class="">
        body { font-family: system-ui, -apple-system, sans-serif; }
        
        /* Custom Spinner Animation */
        .spinner-container {
            display: none;
            justify-content: center;
            align-items: center;
        }
        .spin-icon i {
            animation: spin 1s linear infinite;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* Placeholder State Classes */
        .placeholder-text { color: #ccc; font-size: 0.9rem; pointer-events: none; opacity: 0.7;}
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center py-10 px-4">

    <div class="max-w-md w-full bg-white rounded-xl shadow-lg overflow-hidden border-t-4 border-indigo-600 transition-transform hover:-translate-y-1 duration-300">
        
        <!-- Decorative Top Bar -->
        <div class="h-2 bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500"></div>

        <!-- Header / Logo Area -->
        <div class="p-8 text-center relative z-10">
            <div class="flex justify-center mb-4">
                <i class="bi bi-shield-lock text-4xl text-indigo-600 animate-bounce-short"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 tracking-wide">Secure Access</h1>
            <p class="text-gray-500 mt-2">Welcome back! Please enter your details.</p>
            
            <!-- Progress Bar (Visual Only) -->
            <div class="mt-4 h-1 bg-gray-100 rounded-full overflow-hidden">
                <div class="h-full bg-indigo-500 w-[33%]"></div>
            </div>
        </div>

        <!-- Login Form Container -->
        <form id="loginForm" onsubmit="return false;" novalidate>
            
            <!-- Input Group: Email -->
            <div class="relative group mb-6">
                <label for="email" class="block text-sm font-medium text-gray-700 ml-1 mb-1">Email Address</label>
                <input type="email" 
                       name="email" 
                       id="email"
                       placeholder="name@example.com"
                       required 
                       autocomplete="username">
                
                <div class="absolute inset-x-0 top-3 left-4 flex justify-end pt-3 pb-1">
                    <!-- Eye Icon (Hidden by default) -->
                    <button type="button" onclick="togglePassword('passwordInput')" title="Show Password">
                        <span id="eyeIcon" class="hover:text-gray-400"><i class="bi bi-eye"></i></span>
                    </button>
                    
                    <!-- Lock Icon (Visible if password shown) -->
                    <button type="button" onclick="togglePassword('passLock') " title="Hide Password">
                        <span id="lockIcon" class="hover:text-red-400 hidden"><i class="bi bi-lock"></i></span>
                    </button>
                </div>
            </div>

            <!-- Input Group: Password -->
            <div class="relative group mb-6">
                <label for="password" class="block text-sm font-medium text-gray-700 ml-1 mb-1">Password</label>
                <input type="password" 
                       name="password" 
                       id="password"
                       placeholder="Enter your password"
                       required minlength="8">
                
                 <!-- Show/Hide Toggle Logic -->
                 <div class="absolute inset-y-0 right-0 flex items-center px-3 pointer-events-none">
                     <button type="button" onclick="togglePassVisibility()" class="text-gray-400 hover:text-gray-600 focus:outline-none transition-colors duration-200">
                         <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="M19.5 4.05a2.25 2.25 0 011.5 4.13l-5 5c-.33.34-.82.5-1.31.5h-8.37A2.25 2.25 0 013.5 18v-4.5c0-1.05.46-2.01 1.21-2.66L6.72 2.25a2.25 2.25 0 014.13 0z"/><circle cx="9.75" cy="9.75" r="2.5"/></svg>
                     </button>
                 </div>
             </div>

            <!-- Options Row -->
            <div class="flex justify-end gap-x-4 border-t pt-4 mt-2">
                <label class="inline-flex items-center cursor-pointer select-none text-sm font-semibold text-indigo-600">
                    <input type="checkbox" value="" class="form-checkbox appearance-none brand-blue rounded checked:w-[4px] checked:h-[4px]" />
                    Remember me
                </label>
                <a href="#" class="text-sm font-semibold text-indigo-600 hover:text-indigo-500 relative group">
                    Forgot Password?
                    <i class="bi bi-chevron-right absolute -bottom-0.5 -right-0.5 transform rotate-[-45deg]"></i>
                </a>
            </div>

            <!-- Submit Button -->
            <button id="submitBtn" 
                    type="submit"
                    disabled
                    aria-label="Submit Login"
                    class="relative w-full py-3 px-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold rounded-lg shadow-md hover:brightness-110 active:scale-95 transition-all duration-200 flex items-center justify-center overflow-hidden">
                
                <span class="absolute inset-0 bg-black opacity-0 transition-opacity duration-200 pointer-events-none scale-95"></span>
                
                <span id="btnText">Sign In</span>
            </button>

        </form>

    </div>

    <!-- Loading Overlay (Hidden initially) -->
    <div id="loadingOverlay" class="fixed inset-0 z-50 hidden bg-gray-900/50 backdrop-blur-sm transition-opacity duration-300"></div>
    
    <!-- Spinner Icon -->
    <div id="spinnerIconContainer" class="hidden spinner-container">
        <div class="w-12 h-12 spin-icon"><i class="bi bi-person-badge text-xl animate-spin text-white"></i></div>
    </div>


<script type="text/javascript">
    // --- Tailwind CSS v4 Configuration via JS (Optional for custom config, using standard classes here) ---
    /* Note: Using CDN 'tailwindcss' is the easiest way without a build step */

    const emailField = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const spinnerIconContainer = document.getElementById('spinnerIconContainer');

    function togglePassVisibility() {
      if (passwordInput.type === "password") {
          passwordInput.type = "text";
      } else {
          passwordInput.type = "password";
      }
    }

    // Input Validation Logic (Simulated Server-side logic with HTML5 attributes)
    const validateEmail = () => /[^A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}$/.test(emailField.value);
    
    const checkPasswordLength = () => {
      return passwordInput.value.length >= 8;
    };

    // Add Event Listeners manually as requested
    emailField.addEventListener('input', () => {
        const isValid = !validateEmail();
        
        if (!isValid && !submitBtn.disabled) {
             submitBtn.classList.add('opacity-75', 'cursor-not-allowed');
             submitBtn.innerHTML += '<i class="bi bi-exclamation-triangle text-xs"></i>';
        }
    });

    passwordInput.addEventListener('input', () => {
         if(checkPasswordLength()) {
             submitBtn.disabled = false;
             submitBtn.className.replace(/bg-[color]/g, 'bg-gradient-to-r from-indigo-600 to-purple-600 shadow-md active:bg-indigo-700 hover:brightness-110');
         } else {
             submitBtn.disabled = true;
             submitBtn.className = 'relative w-full py-3 px-4 bg-gray-100 text-gray-400 font-bold rounded-lg cursor-not-allowed';
         }
    });

    // Submit Handler Simulation
    submitBtn.addEventListener('click', async () => {
        setLoading(true);
        
        try {
            await new Promise(resolve => setTimeout(resolve, 2000)); 
            
            alert("Login Successful! \n\n(Here you would usually send data to your backend).");
            location.reload(); // Reload page
            
        } catch(e) {
            alert("Invalid credentials.");
        } finally {
            setLoading(false);
        }
    });

    let isFormValid = false;
    function setLoading(isLoading) {
        btnText.innerText = isLoading ? "Processing..." : "Sign In";
        
        if (isLoading) {
            spinnerIconContainer.classList.remove('hidden');
            loadingOverlay.classList.remove('hidden');
        } else {
            spinnerIconContainer.classList.add('hidden');
            loadingOverlay.classList.add('hidden');
        }
    }
</script>

<!-- Tailwind Config for Custom Colors/Fonts in Script -->
<script>
    tailwind.config = {
        theme: {
            extend: {},
        },
    }
</script>

</body>
</html>
