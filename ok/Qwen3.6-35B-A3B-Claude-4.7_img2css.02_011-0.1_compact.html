<!DOCTYPE html>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<div class="min-h-screen bg-[#f0f0f0] dark:bg-[#1a1a2e] flex flex-col items-center justify-between py-[24px] px-[16px]">
  <!-- Top Bar -->
  <div class="w-full max-w-[480px] flex items-center justify-between px-[20px]">
    <button class="w-[40px] h-[40px] rounded-full bg-white dark:bg-[#2a2a3e] flex items-center justify-center shadow-sm hover:shadow-md transition-shadow">
      <i class="bi bi-share text-[#333] dark:text-[#ccc] text-[18px]"></i>
    </button>
    <button class="w-[40px] h-[40px] rounded-full bg-white dark:bg-[#2a2a3e] flex items-center justify-center shadow-sm hover:shadow-md transition-shadow">
      <i class="bi bi-heart text-[#333] dark:text-[#ccc] text-[18px]"></i>
    </button>
  </div>

  <!-- Product Image Area -->
  <div class="flex-1 flex items-center justify-center w-full max-w-[480px]">
    <img src="/product.png" alt="Navy Blue Trousers" class="w-[280px] h-auto object-contain" />
  </div>

  <!-- Navigation Arrows -->
  <div class="w-full max-w-[480px] flex items-center justify-between px-[20px]">
    <button class="w-[40px] h-[40px] rounded-full bg-white dark:bg-[#2a2a3e] flex items-center justify-center shadow-sm hover:shadow-md transition-shadow">
      <i class="bi bi-chevron-left text-[#333] dark:text-[#ccc] text-[18px]"></i>
    </button>
    <button class="w-[40px] h-[40px] rounded-full bg-white dark:bg-[#2a2a3e] flex items-center justify-center shadow-sm hover:shadow-md transition-shadow">
      <i class="bi bi-chevron-right text-[#333] dark:text-[#ccc] text-[18px]"></i>
    </button>
  </div>

  <!-- Pagination Dots -->
  <div class="flex items-center gap-[8px]">
    <div class="w-[24px] h-[6px] rounded-full bg-[#333] dark:bg-[#ccc]"></div>
    <div class="w-[6px] h-[6px] rounded-full bg-[#999] dark:bg-[#555]"></div>
    <div class="w-[6px] h-[6px] rounded-full bg-[#999] dark:bg-[#555]"></div>
  </div>
</div>
