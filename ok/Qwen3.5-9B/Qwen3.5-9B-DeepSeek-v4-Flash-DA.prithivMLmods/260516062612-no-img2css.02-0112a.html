<!DOCTYPE html>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<div class="min-h-screen bg-[#f5f5f5] dark:bg-[#1a1a1a] flex flex-col items-center justify-center relative">
  <!-- Top bar: left arrow, product image, right arrow -->
  <div class="flex items-center justify-between w-full max-w-2xl px-4 py-6">
    <!-- Left arrow -->
    <button class="w-10 h-10 rounded-full border border-[#333] dark:border-[#ccc] flex items-center justify-center hover:bg-[#e5e5e5] dark:hover:bg-[#333] transition-colors">
      <i class="bi bi-arrow-left text-[#333] dark:text-[#ccc]"></i>
    </button>

    <!-- Product image -->
    <img src="/product.png" alt="Product" class="w-64 h-auto object-contain">

    <!-- Right arrow -->
    <button class="w-10 h-10 rounded-full border border-[#333] dark:border-[#ccc] flex items-center justify-center hover:bg-[#e5e5e5] dark:hover:bg-[#333] transition-colors">
      <i class="bi bi-arrow-right text-[#333] dark:text-[#ccc]"></i>
    </button>
  </div>

  <!-- Top right heart icon -->
  <button class="absolute top-4 right-4 w-8 h-8 rounded-full border border-[#333] dark:border-[#ccc] flex items-center justify-center hover:bg-[#e5e5e5] dark:hover:bg-[#333] transition-colors">
    <i class="bi bi-heart text-[#333] dark:text-[#ccc]"></i>
  </button>

  <!-- Bottom dots navigation -->
  <div class="absolute bottom-4 flex items-center gap-2">
    <div class="w-2 h-2 rounded-full bg-[#333] dark:bg-[#ccc]"></div>
    <div class="w-2 h-2 rounded-full bg-[#e5e5e5] dark:bg-[#666]"></div>
    <div class="w-2 h-2 rounded-full bg-[#e5e5e5] dark:bg-[#666]"></div>
  </div>
</div>
