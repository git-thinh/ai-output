<!DOCTYPE html>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Display</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-slate-900 overflow-hidden">
    <div class="relative w-full h-screen bg-[#f8fafc] dark:bg-slate-800">
        <!-- Close button -->
        <button class="absolute top-6 left-6 text-gray-700 dark:text-white" style="font-size: 24px;">
            <i class="bi-x-lg"></i>
        </button>

        <!-- Product image container (centered) -->
        <div class="flex items-center justify-center h-full">
            <img src="/product.png" alt="Product Image" 
                 class="max-w-[90%] max-h-[80%]" />
        </div>

        <!-- Left navigation arrow -->
        <button class="absolute left-6 bottom-28 text-gray-600 dark:text-white bg-transparent border-none cursor-pointer"
                style="font-size: 32px;">
            <i class="bi-chevron-left"></i>
        </button>

        <!-- Right navigation arrow -->
        <button class="absolute right-6 bottom-28 text-gray-600 dark:text-white bg-transparent border-none cursor-pointer"
                style="font-size: 32px;">
            <i class="bi-chevron-right"></i>
        </button>

        <!-- Pagination dots -->
        <div class="absolute bottom-10 left-1/2 transform -translate-x-1/2 flex space-x-3">
            <span class="w-4 h-4 rounded-full bg-gray-300 dark:bg-slate-600"></span>
            <span class="w-4 h-4 rounded-full bg-gray-300 dark:bg-slate-600"></span>
            <span class="w-4 h-4 rounded-full bg-black dark:bg-white"></span>
        </div>
    </div>
</body>
</html>
