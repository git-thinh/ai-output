/**
 * Xử lý sự kiện Drag Over
 * @param event - Sự kiện dragover từ DOM
 */
const handleDrop = (event: DragEvent) => {
  event.preventDefault();
  isDropZone.value = false;
  const files = Array.from(event.dataTransfer.files || []);
  if (files.length > 0) {
    console.log('Files dropped:', files);
    // TODO: Gọi API để upload các file này lên S3/GCS
    alert(`Successfully processed ${files.length} item(s). Upload logic pending.`);
  } else {
    console.log('No files dropped.');
  }
};
