<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Drive Prototype</title>
    <!-- Tailwind CSS v4 CDN (For quick prototyping) -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Custom Tailwind Configuration (Optional: For custom colors/fonts) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary': '#4f46e5', // Indigo-600
                        'secondary': '#1e293b', // Slate-800
                        'background': '#f8fafc', // Slate-50
                        'card-bg': '#ffffff',
                        'border': '#e2e8f0', // Slate-200
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 min-h-screen antialiased">

    <!-- Main Layout Container -->
    <div class="flex min-h-screen">

        <!-- 1. Sidebar / File Explorer -->
        <aside class="w-64 bg-white border-r border-gray-200 hidden lg:block sticky top-0 h-screen flex-shrink-0 shadow-lg">
            <div class="p-4 border-b border-gray-100">
                <button class="w-full flex items-center justify-center py-2 px-4 text-sm font-medium text-primary bg-primary text-white rounded-lg hover:bg-indigo-700 transition duration-150 shadow-md">
                    <i class="bi bi-folder-fill mr-3"></i>
                    <span>My Files</span>
                </button>
            </div>

            <!-- File Tree View -->
            <div class="p-4 overflow-y-auto h-[calc(100vh-64px)]">
                <h2 class="text-sm font-semibold text-gray-700 mb-3">My Drive</h2>
                
                <!-- Folder Items -->
                <ul class="space-y-1 text-sm">
                    <li class="group text-gray-600 hover:bg-gray-100 p-2 rounded-lg cursor-pointer transition duration-150">
                        <div class="flex items-center space-x-3">
                            <i class="bi bi-folder-fill text-blue-500 text-lg"></i>
                            <span class="truncate font-medium">Documents</span>
                        </div>
                    </li>
                    <li class="group text-gray-600 hover:bg-gray-100 p-2 rounded-lg cursor-pointer transition duration-150">
                        <div class="flex items-center space-x-3">
                            <i class="bi bi-file-earmark-text text-green-500 text-lg"></i>
                            <span class="truncate font-medium">Project Alpha</span>
                        </div>
                    </li>
                    <li class="group text-gray-600 hover:bg-gray-100 p-2 rounded-lg cursor-pointer transition duration-150">
                        <div class="flex items-center space-x-3">
                            <i class="bi bi-file-earmark-image text-yellow-500 text-lg"></i>
                            <span class="truncate font-medium">Photos</span>
                        </div>
                    </li>
                    <li class="group text-gray-600 hover:bg-gray-100 p-2 rounded-lg cursor-pointer transition duration-150">
                        <div class="flex items-center space-x-3">
                            <i class="bi bi-file-earmark-code text-purple-500 text-lg"></i>
                            <span class="truncate font-medium">Settings</span>
                        </div>
                    </li>
                </ul>
            </div>
        </aside>

        <!-- 2. Main Content Area -->
        <main class="flex-1 flex flex-col overflow-y-auto">
            
            <!-- Top Toolbar -->
            <header class="sticky top-0 z-10 bg-white border-b border-gray-200 p-4 shadow-sm">
                <div class="flex items-center justify-between mb-4">
                    <!-- Search Bar -->
                    <div class="relative w-full max-w-xl">
                        <div class="relative flex items-center bg-gray-100 rounded-xl p-3 shadow-inner focus-within:ring-2 focus-within:ring-primary focus-within:border-primary transition duration-150">
                            <i class="bi bi-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            <input type="text" placeholder="Search files, folders, or content..." class="w-full py-2 pl-10 pr-4 text-gray-800 bg-transparent focus:outline-none text-sm placeholder-gray-400">
                        </div>
                    </div>

                    <!-- New File Button -->
                    <button class="flex items-center justify-center bg-primary text-white py-2 px-4 rounded-lg hover:bg-indigo-700 transition duration-150 shadow-md text-sm font-medium">
                        <i class="bi bi-plus-circle mr-2"></i>
                        <span>New File</span>
                    </button>
                </div>
            </header>

            <!-- File List / Content Display -->
            <div class="flex-1 p-6 overflow-y-auto">
                
                <!-- Drop Zone Area -->
                <div id="drop-zone" class="border-2 border-dashed border-gray-300 rounded-xl p-12 text-center bg-white hover:border-primary/50 transition duration-200 cursor-pointer mb-8">
                    <i class="bi bi-cloud-upload text-4xl text-gray-400 mb-3"></i>
                    <p class="text-gray-500 font-medium mb-1">Drag & drop files or folders here</p>
                    <p class="text-gray-400 text-sm">Max file size: 100MB</p>
                    <button class="mt-4 text-primary font-semibold hover:text-indigo-700 transition duration-150">
                        <i class="bi bi-upload mr-2"></i>
                        <span>Browse your files</span>
                    </button>
                </div>

                <!-- Placeholder for actual File/Folder List -->
                <div class="space-y-3">
                    <!-- Example File Item -->
                    <div class="flex items-center justify-between bg-white p-3 rounded-lg border border-gray-200 hover:bg-gray-50 transition duration-150">
                        <div class="flex items-center space-x-3">
                            <i class="bi bi-file-earmark-text text-green-500 text-lg"></i>
                            <span class="truncate font-medium text-gray-800">My_Report_Q3.pdf</span>
                        </div>
                        <div class="flex items-center space-x-3 text-xs text-gray-500">
                            <i class="bi bi-clock-fill"></i>
                            <span>2 hours ago</span>
                        </div>
                    </div>

                    <!-- Example Folder Item -->
                    <div class="flex items-center justify-between bg-gray-100 p-3 rounded-lg border border-gray-200 hover:bg-gray-200 transition duration-150">
                        <div class="flex items-center space-x-3">
                            <i class="bi bi-folder-fill text-yellow-500 text-lg"></i>
                            <span class="truncate font-medium text-gray-800">Project Alpha</span>
                        </div>
                        <div class="flex items-center space-x-3 text-xs text-gray-500">
                            <i class="bi bi-chevron-right"></i>
                        </div>
                    </div>
                </div>

            </div>
        </main>

    </div>

</body>
</html>
