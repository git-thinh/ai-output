<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – Quản lý thư mục & tập tin</title>

  <!-- Tailwind CSS v4 -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
        rel="stylesheet">

  <!-- Bootstrap‑icons (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet">
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">
  <!-- ==================== Header ==================== -->
  <div class="bg-white border border-gray-200 rounded-lg py-4">
    <header class="flex justify-between items-center px-4">
      <h1 class="text-xl font-bold text-gray-800">Quản lý thư mục & tập tin</h1>
      <div class="flex gap-2">
        <i class="bi bi-file" style="color:var(--tint-200);"></i>
        <i class="bi bi-cloud" style="color:var(--tint-200);"></i>
        <i class="bi bi-check" style="color:var(--tint-200);"></i>
      </div>
    </header>

    <!-- ==================== Main Dashboard ==================== -->
    <main class="flex-1 p-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- ==== Thư mục ==== -->
        <div class="bg-white rounded-lg shadow-lg p-4">
          <h3 class="text-lg font-semibold mb-2">Thư mục</h3>
          <ul class="list-disc list-inset mb-2">
            <li><a href="#" class="text-gray-600 hover:text-gray-800">Thuộc 1</a></li>
            <li><a href="#" class="text-gray-600 hover:text-gray-800">Thuộc 2</a></li>
            <li><a href="#" class="text-gray-600 hover:text-gray-800">Thuộc 3</a></li>
          </ul>
          <div class="mt-4 text-sm text-gray-500">Số file: 12</div>
        </div>

        <!-- ==== Tập tin ==== -->
        <div class="bg-white rounded-lg shadow-lg p-4">
          <h3 class="text-lg font-semibold mb-2">Tập tin</h3>
          <ul class="list-disc list-inset mb-2">
            <li><a href="#" class="text-gray-600 hover:text-gray-800">DOC-001</a></li>
            <li><a href="#" class="text-gray-600 hover:text-gray-800">PDF-001</a></li>
            <li><a href="#" class="text-gray-600 hover:text-gray-800">ZIP-001</a></li>
          </ul>
          <div class="mt-4 text-sm text-gray-500">Số file: 8</div>
        </div>
      </div>
    </main>

    <!-- ==================== Footer ==================== -->
    <footer class="mt-8 text-center text-sm text-gray-500">
      <div class="flex items-center justify-center">
        <i class="bi bi-shield" style="color:var(--tint-200);"></i>
        <small class="ml-1">© 2025 MyApp</small>
      </div>
    </footer>
  </div>
</body>
</html>
