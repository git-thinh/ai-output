        html,

            height: 100%;

            font-size: 14px;
            color: #fff;
            margin: 0;
            padding: 0;
        }

        .swiper {
            width: 100%;
            height: 100%;
            margin-left: auto;
            margin-right: auto;
        }

        .swiper-slide {
            text-align: center;
            font-size: 18px;
            background: #333;
            height: calc((100% - 30px) / 2) !important;

            /* Center slide text vertically */
            display: flex;
            justify-content: center;
            align-items: center;

            overflow: hidden;
        }
        .swiper-slide {
            width: 25%;
        }

        .swiper-slide:nth-child(2n) {
            width: 25%;
        }

        .swiper-slide:nth-child(3n) {
            width: 16.3%;
        }
    </style>
</head>
