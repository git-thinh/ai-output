<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Swiper demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1" />
    <!-- Link Swiper's CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />

    <!-- Demo styles -->
    <style>
        html,
        body {
            position: relative;
            height: 100%;
        }

        body {
            background: #000;
            font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
            font-size: 14px;
            color: #fff;
            margin: 0;
            padding: 0;
        }

        .swiper {
            /*
            width: 100%;
            height: 100%;
            */
            width: 1000px;
            height: 300px;
            background-color: aqua;
            margin-top: 30px;
        }

        .swiper-slide {
            text-align: center;
            font-size: 18px;
            background: #444;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .swiper-slide img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .swiper-slide {
            width: 25%;
        }

        .swiper-slide:nth-child(2n) {
            width: 40%;
        }

        .swiper-slide:nth-child(3n) {
            width: 20%;
        }
    </style>
</head>

<body>
    <!-- Swiper -->
    <div class="swiper mySwiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide">
                <img
                    src="https://app-mascotapigateway-prod.azurewebsites.net/cms-media/dw5h2rsg/domicil.jpg" />
            </div>
            <div class="swiper-slide">
                <img
                    src="https://app-mascotapigateway-prod.azurewebsites.net/cms-media/runj310x/250809_mbymascot_london0015.jpg" />
            </div>
            <div class="swiper-slide">
                <img
                    src="https://app-mascotapigateway-prod.azurewebsites.net/cms-media/ekzdzj4t/25416-644-12_25214-742-60_25037-644-12_a02.jpg" />
            </div>
            <div class="swiper-slide">
                <img src="https://app-mascotapigateway-prod.azurewebsites.net/cms-media/0nobq1m5/_dsc5656.jpg" />
            </div>
            <div class="swiper-slide">
                <img
                    src="https://app-mascotapigateway-prod.azurewebsites.net/cms-media/5dij1zgy/25406-665-1288_25004-742-60_25837-665-1288_25050-288-1216_f3000-902-13_a01.jpg" />
            </div>
            <div class="swiper-slide">
                <img
                    src="https://app-mascotapigateway-prod.azurewebsites.net/cms-media/uofgsmbl/customized_banner_frontpage.jpg" />
            </div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

    <!-- Initialize Swiper -->
    <script>
        var swiper = new Swiper(".mySwiper", {
            slidesPerView: 5,
            spaceBetween: 30,
            freeMode: true,

            // slidesPerView: 5,
            // spaceBetween: 10,
            // allowTouchMove: true,
            // watchOverflow: true,
            // watchSlidesProgress: true,
            // centerInsufficientSlides: true,
            // resistanceRatio: 0,

            pagination: {
                el: ".swiper-pagination",
                clickable: true,
            },
        });
    </script>
</body>

</html>
