<!DOCTYPE html>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<style>
  .swatch-striped {
    background: repeating-linear-gradient(
      90deg,
      #1a237e 0px,
      #1a237e 4px,
      #d0d5db 4px,
      #d0d5db 8px
    );
  }
</style>

<div class="min-h-screen bg-white dark:bg-[#0f172a] p-[24px]">
  <div class="max-w-[480px] mx-auto">
    <div class="bg-white dark:bg-[#1e293b] rounded-[8px] p-[20px] shadow-sm dark:shadow-none border border-gray-100 dark:border-gray-700">
      <div class="flex flex-col gap-[16px]">
        <!-- Product Code -->
        <p class="text-[13px] text-[#6b7280] font-normal tracking-wide">25214 - 742</p>

        <!-- Title -->
        <h2 class="text-[18px] font-bold text-[#111827] dark:text-white leading-[1.3]">Trousers, men</h2>

        <!-- Subtitle -->
        <p class="text-[14px] text-[#374151] dark:text-gray-300 font-normal leading-[1.4]">Classic fit</p>

        <!-- Color Description -->
        <p class="text-[14px] text-[#374151] dark:text-gray-300 font-normal leading-[1.4]">Midnight Blue / Lightgrey Stripes</p>

        <!-- Color Swatches -->
        <div class="flex items-center gap-[12px]">
          <!-- Midnight Blue -->
          <div class="w-[28px] h-[28px] rounded-full bg-[#1a237e] border border-gray-200 dark:border-gray-600"></div>

          <!-- Striped -->
          <div class="swatch-striped w-[28px] h-[28px] rounded-full border border-gray-200 dark:border-gray-600"></div>

          <!-- Medium Blue -->
          <div class="w-[28px] h-[28px] rounded-full bg-[#1e40af] border border-gray-200 dark:border-gray-600"></div>

          <!-- Black -->
          <div class="w-[28px] h-[28px] rounded-full bg-[#111827] border border-gray-200 dark:border-gray-600"></div>
        </div>

        <!-- Price -->
        <p class="text-[16px] font-semibold text-[#111827] dark:text-white leading-[1.4]">79 £</p>
      </div>
    </div>
  </div>
</div>
