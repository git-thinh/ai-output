<!DOCTYPE html>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<div class="min-h-screen bg-white dark:bg-[#1a1a1a] text-gray-900 dark:text-gray-100 flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-white dark:bg-[#2a2a2a] rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 p-6">
    <!-- Product Code -->
    <div class="text-xs text-gray-500 dark:text-gray-400 mb-2">25214 - 742</div>

    <!-- Product Title -->
    <h1 class="text-2xl font-bold mb-1">Trousers, men</h1>

    <!-- Fit Description -->
    <p class="text-sm text-gray-600 dark:text-gray-400 mb-4">Classic fit</p>

    <!-- Color Name -->
    <p class="text-sm font-medium mb-3">Midnight Blue / Lightgrey Stripes</p>

    <!-- Color Swatches -->
    <div class="flex items-center space-x-3 mb-6">
      <!-- Swatch 1: Dark Blue -->
      <div class="w-8 h-8 rounded-full bg-[#0a1a3a] border border-gray-200 dark:border-gray-700"></div>
      <!-- Swatch 2: Striped -->
      <div class="w-8 h-8 rounded-full bg-[#f5f5f5] border border-gray-200 dark:border-gray-700 flex items-center justify-center">
        <div class="w-full h-full bg-[#e0e0e0] flex items-center justify-center">
          <div class="w-full h-full bg-[#d1d1d1]"></div>
        </div>
      </div>
      <!-- Swatch 3: Medium Blue -->
      <div class="w-8 h-8 rounded-full bg-[#2a5a8a] border border-gray-200 dark:border-gray-700"></div>
      <!-- Swatch 4: Black -->
      <div class="w-8 h-8 rounded-full bg-black border border-gray-200 dark:border-gray-700"></div>
    </div>

    <!-- Price -->
    <p class="text-xl font-semibold">79 £</p>
  </div>
</div>
