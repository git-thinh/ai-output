<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Drive - My Files</title>

    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">


    <style>
        /* Required: Bootstrap Icons font configuration */
        body {
            font-family: 'Bootstrap Icons', 'Font Awesome', 'FontAwesome';
        }
    </style>
</head>

<body class="bg-gray-800 text-white">
    <!-- Main Container -->
    <div class="flex justify-center h-screen p-24">

        <!-- Login Card -->
        <div class="card bg-gray-600 w-384 h-576 rounded-16 shadow-16">
            <div class="p-32">
                <!-- Logo/Title Section -->
                <div class="flex justify-center flex-vertical align-center mt-24 mb-16">
                    <span class="bi-locked text-h4 text-h1 w-96 h-96 rounded-48 bg-gray-400"
                        style="--bi-size: 96px; --bi-family: 'Bootstrap Icons'">
                        Login
                    </span>
                </div>

                <p class="text-p text-gray-300">
                    Welcome to the application.
                    Enter your credentials below.
                </p>

                <!-- Form -->
                <div class="flex-vertical mt-48">

                    <!-- Username Field -->
                    <div class="flex-horizontal align-start mb-16">
                        <span class="bi-gm text-h2 bg-gray-300 w-32 h-32 rounded-16"
                            style="--bi-size: 32px; --bi-family: 'Bootstrap Icons'"></span>
                        <input class="text-gray-100 placeholder-gray-400 w-full mt-8" placeholder="Username" type="text"
                            style="border:none border-bottom:1px border-gray-600">
                    </div>

                    <!-- Password Field -->
                    <div class="flex-horizontal align-start mb-24">
                        <span class="bi-key text-h2 bg-gray-300 w-32 h-32 rounded-16"
                            style="--bi-size: 32px; --bi-family: 'Bootstrap Icons'"></span>
                        <input class="text-gray-100 placeholder-gray-400 w-full mt-8" placeholder="Password" type="text"
                            style="border:none border-bottom:1px border-gray-600">
                    </div>

                    <!-- Submit Button -->
                    <button class="btn-primary text-white w-full rounded-8" type="submit">
                        Submit
                    </button>

                    <!-- Footer Links -->
                    <p class="text-m text-gray-300 mt-16">
                        Already logged in? <a href="javascript:void(0)" class="text-gray-300" style="color:gray">Log
                            out</a>
                    </p>

                </div>

            </div>

        </div>
    </div>
</body>

</html>
