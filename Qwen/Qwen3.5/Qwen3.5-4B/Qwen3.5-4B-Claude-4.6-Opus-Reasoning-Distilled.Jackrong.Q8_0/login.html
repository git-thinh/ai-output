<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYS_ADMIN // LOGIN</title>
    
    <!-- 1. Load Tailwind CSS v4 via Script -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    
    <!-- 2. Load Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- 3. Load Monospaced Font -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* Custom Config within style tag for specific colors not in default palette */
        :root {
            --terminal-green: #0f0;
            --terminal-dim: #003b00;
        }
        
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: #050505;
        }

        /* Scanline effect overlay */
        .scanlines::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center overflow-hidden scanlines relative text-[#0f0]">

    <!-- Background Grid Pattern -->
    <div class="absolute inset-0 opacity-20 pointer-events-none" 
         style="background-image: radial-gradient(#0f0 1px, transparent 1px); background-size: 20px 20px;">
    </div>

    <!-- Main Login Window Container -->
    <main class="relative z-10 w-full max-w-md p-1 border-4 border-double border-[#0f0] bg-black shadow-[0_0_20px_rgba(0,255,0,0.4)] rounded-sm">
        
        <!-- Header Bar (Window Title) -->
        <header class="flex items-center justify-between px-4 py-2 bg-[#0a1a0a] border-b-2 border-[#0f0] mb-4 select-none cursor-default">
            <div class="flex items-center gap-2 text-xs uppercase tracking-widest font-bold">
                <i class="bi bi-terminal-fill"></i>
                <span>root@server:~$ login.exe</span>
            </div>
            
            <!-- Status Indicators -->
            <div class="flex gap-1">
                <div class="w-3 h-3 rounded-full bg-red-500 animate-pulse"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500 animate-pulse delay-75"></div>
                <div class="w-3 h-3 rounded-full bg-green-500 animate-pulse delay-150"></div>
            </div>
        </header>

        <!-- Form Content Area -->
        <form action="#" method="POST" class="p-8 space-y-6">
            
            <!-- Username Input Section -->
            <div class="space-y-1 group">
                <label for="username" class="block text-xs font-bold uppercase ml-1 opacity-80">
                    > User ID
                </label>
                <input type="text" id="username" name="username" placeholder="admin" autocomplete="off"
                       class="w-full bg-transparent border-b-2 border-gray-700 focus:border-[#0f0] outline-none text-lg p-1 transition-colors duration-200 font-mono">
                
                <!-- Error Message Simulation (Hidden by default) -->
                <p id="error-msg" class="hidden text-red-500 text-xs mt-1 blink-animation">
                    ACCESS DENIED // INVALID CREDENTIALS
                </p>
            </div>

            <!-- Password Input Section -->
            <div class="space-y-1 group">
                <label for="password" class="block text-xs font-bold uppercase ml-1 opacity-80">
                    > Passphrase
                </label>
                <input type="password" id="password" name="password" placeholder="••••••••" 
                       class="w-full bg-transparent border-b-2 border-gray-700 focus:border-[#0f0] outline-none text-lg p-1 transition-colors duration-200 font-mono">
            </div>

            <!-- Action Button -->
            <button type="submit" 
                    class="w-full py-4 bg-black border-2 border-[#0f0] hover:bg-[#0a1a0a] active:translate-y-1 transition-all duration-100 flex items-center justify-center gap-3 font-bold tracking-wider shadow-[inset_0_0_10px_rgba(0,255,0,0.2)]">
                <i class="bi bi-box-arrow-up-right"></i>
                INITIALIZE SESSION
            </button>

            <!-- Footer / System Info -->
            <footer class="pt-4 border-t border-gray-800 text-[10px] text-green-700 leading-relaxed font-mono">
                <span class="mr-2"><i class="bi bi-cpu-fill"></i></span>
                SYSTEM VERSION 9.0.2-BETA<br>
                ENCRYPTION: AES-256-GCM<br>
                CONNECTION: SECURE TUNNEL ESTABLISHED
            </footer>
        </form>
    </main>

</body>
</html>
