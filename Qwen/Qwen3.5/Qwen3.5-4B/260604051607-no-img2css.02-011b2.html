<!DOCTYPE html>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<div class="min-h-screen bg-gray-50 dark:bg-gray-900 flex flex-col items-center justify-center p-4 transition-colors duration-300">
    <!-- Top Navigation Bar -->
    <div class="w-full max-w-md flex justify-between items-center mb-6">
        <!-- Left Icon: Share/Exchange -->
        <button class="text-gray-800 dark:text-white hover:bg-gray-200 dark:hover:bg-gray-800 p-2 rounded-full transition-colors">
            <i class="bi bi-arrow-repeat text-xl"></i>
        </button>
        
        <!-- Right Icon: Heart -->
        <button class="text-gray-800 dark:text-white hover:bg-gray-200 dark:hover:bg-gray-800 p-2 rounded-full transition-colors">
            <i class="bi bi-heart text-xl"></i>
        </button>
    </div>

    <!-- Main Product Area -->
    <div class="relative w-full max-w-md aspect-[3/4] bg-white dark:bg-gray-800 shadow-sm rounded-lg overflow-hidden flex items-center justify-center">
        <!-- Left Navigation Button -->
        <button class="absolute left-4 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full border border-gray-300 dark:border-gray-600 flex items-center justify-center text-gray-800 dark:text-white hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors z-10">
            <i class="bi bi-chevron-left text-lg"></i>
        </button>

        <!-- Right Navigation Button -->
        <button class="absolute right-4 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full border border-gray-300 dark:border-gray-600 flex items-center justify-center text-gray-800 dark:text-white hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors z-10">
            <i class="bi bi-chevron-right text-lg"></i>
        </button>

        <!-- Product Image -->
        <img src="/product.png" alt="Navy Trousers" class="w-full h-full object-contain mix-blend-multiply dark:mix-blend-normal">
    </div>

    <!-- Pagination Dots -->
    <div class="mt-8 flex items-center justify-center gap-2">
        <div class="w-2 h-2 rounded-full bg-gray-900 dark:bg-white"></div>
        <div class="w-2 h-2 rounded-full bg-gray-300 dark:bg-gray-600"></div>
        <div class="w-2 h-2 rounded-full bg-gray-300 dark:bg-gray-600"></div>
    </div>
</div>
