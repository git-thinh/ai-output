<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Tailwind v4 & Bootstrap Icons</title>
    
    <!-- 1. Tailwind CSS v4 (Sử dụng CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Bootstrap Icons (Sử dụng CDN) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
        
        <!-- Phần đầu trang -->
        <div class="px-8 pt-8 pb-6 text-center">
            <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-blue-100 mb-4">
                <i class="bi bi-person-circle text-blue-600 text-2xl"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-gray-900">Chào mừng trở lại</h2>
            <p class="mt-2 text-sm text-gray-500">Nhập thông tin để đăng nhập vào tài khoản của bạn</p>
        </div>

        <!-- Form đăng nhập -->
        <div class="px-8 pb-8">
            <form class="space-y-5" action="#" method="POST">
                
                <!-- Nhập Email -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Địa chỉ Email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="bi bi-envelope text-gray-400"></i>
                        </div>
                        <input id="email" name="email" type="email" required autocomplete="email"
                            class="appearance-none block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                            placeholder="name@example.com">
                    </div>
                </div>

                <!-- Nhập Mật khẩu -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="bi bi-key text-gray-400"></i>
                        </div>
                        <input id="password" name="password" type="password" required autocomplete="current-password"
                            class="appearance-none block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                            placeholder="••••••••">
                    </div>
                </div>

                <!-- Nhớ tôi & Quên mật khẩu -->
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" 
                            class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                        <label for="remember-me" class="ml-2 block text-sm text-gray-700">
                            Ghi nhớ tôi
                        </label>
                    </div>

                    <div class="text-sm">
                        <a href="#" class="font-medium text-blue-600 hover:text-blue-500 transition-colors">
                            Quên mật khẩu?
                        </a>
                    </div>
                </div>

                <!-- Nút Đăng nhập -->
                <button type="submit"
                    class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors duration-150">
                    Đăng nhập
                </button>
            </form>

            <!-- Phân tách đăng ký -->
            <div class="mt-6">
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500">Hoặc</span>
                    </div>
                </div>

                <div class="mt-6">
                    <a href="#" class="w-full flex items-center justify-center px-4 py-2 border border-gray-300 rounded-lg shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 transition-colors duration-150">
                        <i class="bi bi-google text-red-500 mr-2 text-lg"></i>
                        Đăng nhập bằng Google
                    </a>
                </div>
            </div>

            <!-- Chặn người lạ đăng ký -->
            <div class="mt-8 text-center">
                <p class="text-sm text-gray-500">
                    Chưa có tài khoản? 
                    <a href="#" class="font-medium text-blue-600 hover:text-blue-500 transition-colors">
                        Đăng ký ngay
                    </a>
                </p>
            </div>
        </div>
    </div>

</body>
</html>
