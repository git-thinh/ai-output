<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Modern UI</title>
    
    <!-- Tailwind CSS (V4) -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/bootstrap.min.css">

    <!-- Custom Config for Dark Theme & Colors -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5', // Indigo 600
                        secondary: '#1e293b', // Slate 800
                        background: '#f8fafc', // Slate 50
                        surface: '#ffffff',
                        border: 'border-gray-300'
                    }
                }
            }
        }
    </script>
</head>
<body class="font-sans text-secondary antialiased min-h-screen flex items-center justify-center p-4">

    <!-- Login Card Container -->
    <div class="w-full max-w-md relative z-10">
        
        <!-- Background decoration (optional) -->
        <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
             <svg width="100%" height="100%">
                 <path d="M0,0 C72,0 108,72 108,108 S216,108 216,72 C216,0 144,0 144,72 S72,108 72,108 Z M0,0 H108 V108 H0 Z" fill="#4F46E5"/>
             </svg>
        </div>

        <!-- Main Card -->
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 transition-all duration-300 hover:-translate-y-1">
            
            <!-- Header Section -->
            <div class="p-8 md:p-10 bg-gradient-to-b from-primary to-indigo-600 relative">
                
                <!-- Decorative Circle -->
                <div class="absolute -top-10 -right-10 w-40 h-40 bg-white rounded-full blur-2xl opacity-50"></div>

                <h2 class="text-2xl font-bold text-white mb-2 tracking-tight">Welcome Back</h2>
                <p class="text-sm text-gray-300 mt-1">Please enter your details below.</p>

                <!-- Form Elements -->
                <form action="#" method="POST" class="space-y-6">
                    
                    <!-- Email Input -->
                    <div class="relative group">
                        <label for="email" class="block text-xs font-semibold uppercase tracking-wide text-gray-500 mb-1.5 ml-1">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="name@example.com" 
                            class="w-full px-4 py-3 rounded-lg bg-transparent outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary/20 transition-all text-gray-900 placeholder:text-gray-400">
                        
                        <i class="fas fa-envelope absolute right-4 top-3.5 text-gray-400 group-focus-within:text-primary transition-colors"></i>
                    </div>

                    <!-- Password Input -->
                    <div class="relative group">
                        <label for="password" class="block text-xs font-semibold uppercase tracking-wide text-gray-500 mb-1.5 ml-1">Password</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" 
                            class="w-full px-4 py-3 rounded-lg bg-transparent outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-secondary focus:ring-primary/20 transition-all text-gray-900 placeholder:text-gray-400">
                        
                        <span class="absolute left-4 top-3.5 text-gray-400 hidden group-hover:flex items-center gap-1.5 pointer-events-none">
                            <i class="far fa-eye-slash"></i>
                            <i class="far fa-eye"></i>
                        </span>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-base font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all transform active:scale-[0.98]">
                        Sign In
                    </button>
                </form>

            </div>

            <!-- Footer / Links Section -->
            <div class="bg-gray-50 p-6 md:p-8 pt-0 relative z-10">
                
                <p class="text-center text-sm text-gray-500 mb-4">Or continue with:</p>
                <div class="flex justify-center space-x-4">
                    <a href="#" class="text-gray-400 hover:text-primary transition-colors"><i class="fab fa-google text-xl"></i></a>
                    <a href="#" class="text-gray-400 hover:text-blue-600 transition-colors"><i class="fab fa-facebook-f text-xl"></i></a>
                    <a href="#" class="text-gray-400 hover:text-pink-600 transition-colors"><i class="fab fa-twitter text-xl"></i></a>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
