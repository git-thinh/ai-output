<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyrillic Login</title>
    
    <!-- Tailwind CSS v4 -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        /* Custom Styles */
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8fafc;
            min-height: 100vh;
        }

        .code-page-container {
            max-width: 400px;
            margin: 50px auto;
            text-align: center;
            color: #1e293b;
        }

        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 3rem 2rem;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .input-group {
            position: relative;
            margin-top: 1.5rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border: none;
            border-radius: 10px;
            transition: all 0.3s ease;
            outline: none;
            box-sizing: border-box;
        }

        .input-group input:focus {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-bottom-right-radius: 10px;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            font-weight: 500;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        /* Success Message */
        .success-message {
            display: none;
            text-align: left;
            padding: 2rem;
            animation: fadeIn 0.5s ease;
        }

        .success-message.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: white;
            border: none;
            color: #64748b;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .icon-btn:hover {
            background: #f1f5f9;
            color: #3b82f6;
        }
    </style>
</head>
<body class="text-gray-800">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="#" class="flex items-center gap-2 group">
                <div class="logo-icon">
                    <i data-bs-toggle="tooltip" title="Cyrillic Login"></i>
                </div>
                <span class="font-bold text-xl tracking-tight bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">CodePage</span>
            </a>
            
            <button onclick="resetPassword()" class="hidden md:block icon-btn text-red-500 hover:text-red-700">
                <i data-bs-toggle="tooltip" title="Reset Password"></i>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="code-page-container relative">
        
        <!-- Success Message (Hidden by default) -->
        <div id="loginSuccess" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-end justify-center p-4 z-50 hidden">
            <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8 text-center animate-slide-up">
                <div class="mb-4 inline-block p-3 bg-green-100 rounded-lg text-green-600">
                    <i data-bmi="success" style="display:inline-flex; justify-content:center;align-items:center;"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-.91L12 4.92l5.93 5.16A10 10 0 0 1 22 12zm-6-1a1 1 0 0 0-1 1v1a1 1 0 0 0 2 0v-1a1 1 0 0 0-1-1z"/></svg></div>
                </div>
                <h2 class="text-3xl font-bold mb-2">Login Successful!</h2>
                <p class="text-gray-500 mb-6">Welcome back, user.</p>
                
                <div class="flex gap-4 justify-center">
                    <button onclick="location.reload()" class="btn-primary px-6 py-2 rounded-xl text-sm font-medium transition">Log In Again</button>
                    <button onclick="resetPassword()" class="icon-btn w-12 h-12 flex items-center justify-center text-blue-600 border-2 border-transparent hover:border-blue-500 rounded-xl transition">
                        <i data-bmi="eye" style="font-size: 1.2rem;"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Login Form -->
        <form action="#" method="POST" class="bg-white p-8 md:p-12 rounded-3xl shadow-lg border border-gray-100">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 relative">
                
                <!-- Left Side (Cyrillic) -->
                <div class="hidden lg:block col-span-1">
                    <label for="username" class="block text-xs font-semibold text-indigo-600 uppercase tracking-wider mb-2">Username / Email</label>
                    <input type="text" id="username" name="username" placeholder="Имя пользователя или email" 
                           class="w-full bg-slate-50 border-none focus:ring-2 focus:ring-indigo-500/20 text-lg font-medium placeholder:text-gray-400 transition-all">
                </div>

                <!-- Right Side (English) -->
                <div class="col-span-1 flex flex-col justify-between">
                    
                    <div>
                         <label for="password" class="block text-xs font-semibold text-purple-600 uppercase tracking-wider mb-2">Password</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" 
                               class="w-full bg-slate-50 border-none focus:ring-2 focus:ring-purple-500/20 text-lg font-medium placeholder:text-gray-400 transition-all">
                    </div>

                    <button type="submit" class="mt-auto btn-primary w-full py-3 rounded-xl text-base font-bold shadow-md transform hover:-translate-y-0.5 active:scale-[0.99] transition-colors">
                        Войти
                    </button>
                </div>

            </div>

            <!-- Reset Password Button (Visible on Desktop) -->
            <div class="md:hidden mt-6 pt-4 pb-2 border-t border-gray-100">
                 <a href="#" onclick="resetPassword()" class="flex items-center justify-center w-full gap-2 text-sm text-red-600 hover:bg-red-50 px-4 py-2 rounded-lg transition">
                     <i data-bmi="eye" style="font-size: 1rem;"></i> Забыли пароль?
                 </a>
            </div>

        </form>
    </main>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Simple script to handle the success state visibility toggle
        document.getElementById('loginSuccess').classList.toggle('active', window.location.pathname.includes('/success'));
        
        // Optional: Prevent default submission behavior if needed, though Tailwind handles it usually fine without JS
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            
            // In a real app, you would send this data to your backend here
            console.log("Submitting:", username);
        });

        function resetPassword() {
            alert("Reset password feature is implemented! Redirecting to login page...");
            location.reload();
        }
    </script>
</body>
</html>
