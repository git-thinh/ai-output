<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Page Login</title>

    <!-- Tailwind CSS v4 (CDN) -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        /* Custom styling for the login card */
        .login-card {
            border: 1px solid #e5e7eb;
            border-radius: .75rem;
            overflow: hidden;
            box-shadow: 0 .25rem .375rem rgba(0,0,0,.075);
        }
        .login-card * {
            box-sizing: border-box;
        }
        .login-header {
            background-color: #f9fafb;
            padding: 1.5rem;
            border-bottom: 1px solid #e5e7eb;
        }
        .login-body {
            padding: 1.5rem;
        }
        .input-group {
            position: relative;
            margin-bottom: 1rem;
        }
        .input-group i {
            position: absolute;
            left: .75rem;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
        }
        .input-group input {
            padding-left: 2.75rem;
        }
        .btn-login {
            background-color: #2563eb;
            border-color: #2563eb;
            color: white;
        }
        .btn-login:hover {
            background-color: #1d4ed8;
            border-color: #1d4ed8;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="login-card w-full max-w-md">
        <div class="login-header text-center">
            <h2 class="text-2xl font-bold text-gray-900">
                <i class="bi bi-box-lock me-2"></i>
                Login
            </h2>
        </div>
        <div class="login-body">
            <form action="#" method="POST">
                <!-- Username -->
                <div class="input-group">
                    <label for="username" class="block mb-1 text-sm font-medium text-gray-700">
                        Username
                    </label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" class="w-full rounded-lg border-gray-300 border p-2 pl-3 pr-0 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition duration-200">
                    <i class="bi bi-person"></i>
                </div>

                <!-- Password -->
                <div class="input-group">
                    <label for="password" class="block mb-1 text-sm font-medium text-gray-700">
                        Password
                    </label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" class="w-full rounded-lg border-gray-300 border p-2 pl-3 pr-0 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition duration-200">
                    <i class="bi bi-lock"></i>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="flex items-center justify-between mb-4">
                    <label class="flex items-center text-gray-700">
                        <input type="checkbox" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                        <span class="ms-1 text-sm">Remember me</span>
                    </label>
                    <a href="#" class="text-sm text-blue-600 hover:text-blue-800 transition duration-200">
                        <i class="bi bi-info-circle me-1"></i> Forgot password?
                    </a>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-login w-full py-2 rounded-lg font-semibold hover:bg-blue-700 transition duration-200">
                    <i class="bi bi-box-arrow-right me-1"></i>
                    Login
                </button>
            </form>
        </div>
    </div>

</body>
</html>
