<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Secure Access</title>
<!-- Tailwind CSS v4 via CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #f1f5f9; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
</style>
</head>
<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center p-4 font-sans antialiased">

<div class="w-full max-w-[1200px] bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col md:flex-row h-auto md:h-[700px]">
  
  <!-- Left Side - Branding -->
  <div class="hidden md:flex w-1/2 relative bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1557683316-973673baf926?q=80&w=2000&auto=format&fit=crop');">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
    <div class="relative z-10 px-12 py-16 text-white">
      <h1 class="text-4xl font-bold mb-4">Welcome Back</h1>
      <p class="text-lg opacity-90">Sign in to access your dashboard.</p>
    </div>
  </div>
  
  <!-- Right Side - Login Form -->
  <div class="flex-1 p-8 md:p-12 flex flex-col justify-between">
    
    <form action="#" method="POST" class="space-y-6">
      
      <!-- Logo -->
      <div class="mb-8">
        <i class="bi bi-shield-lock-fill text-indigo-600 text-5xl"></i>
      </div>

      <!-- Username Input -->
      <div>
        <label for="username" class="block text-sm font-medium text-gray-700 mb-2">Username or Email</label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"><i class="bi bi-person-circle"></i></span>
          <input type="text" id="username" name="username" required 
                 placeholder="Enter your username"
                 class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all duration-200">
        </div>
      </div>

      <!-- Password Input -->
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"><i class="bi bi-key"></i></span>
          <input type="password" id="password" name="password" required 
                 placeholder="••••••••"
                 class="w-full pl-10 pr-12 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all duration-200">
          <button type="submit" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-indigo-600 transition-colors">
            <i class="bi bi-eye-slash"></i>
          </button>
        </div>
      </div>

      <!-- Remember Me & Forgot Password -->
      <div class="flex items-center justify-between">
        <label class="inline-flex items-center cursor-pointer group">
          <input type="checkbox" class="sr-only peer">
          <div class="relative w-5 h-5 mr-2 flex items-center justify-center bg-gray-200 rounded-lg peer-checked:bg-indigo-600 transition-colors">
            <svg class="w-3.5 h-3.5 text-white opacity-0 peer-checked:opacity-100 transition-opacity" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
          <span class="text-sm text-gray-600 group-hover:text-gray-800">Remember me</span>
        </label>
        <a href="#" class="text-sm font-medium text-indigo-600 hover:text-indigo-700 transition-colors">Forgot password?</a>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="w-full py-3 px-4 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transform hover:-translate-y-0.5 transition-all duration-200">Sign In</button>
    </form>

    <!-- Footer Links -->
    <p class="mt-8 text-center text-sm text-gray-600">Don't have an account? <a href="#" class="font-semibold text-indigo-600 hover:text-indigo-700 transition-colors">Register now</a></p>
    
  </div>
  
</div>

</body>
</html>
