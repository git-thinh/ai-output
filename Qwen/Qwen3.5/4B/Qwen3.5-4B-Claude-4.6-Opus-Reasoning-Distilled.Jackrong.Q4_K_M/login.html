<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Terminal Interface</title>
    
    <!-- Tailwind CSS -->
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Custom Font for Coding Feel -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .code-font {
            font-family: 'Fira Code', monospace;
        }
    </style>
</head>
<body class="bg-zinc-950 text-gray-300 min-h-screen flex items-center justify-center p-4 selection:bg-cyan-500 selection:text-black">

    <!-- Main Container -->
    <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 rounded-lg shadow-2xl overflow-hidden relative">
        
        <!-- Decorative Top Bar (Simulating Window Title) -->
        <div class="h-10 bg-zinc-800 flex items-center px-4 gap-2 select-none cursor-default">
            <div class="flex gap-2">
                <div class="w-3 h-3 rounded-full bg-red-500 hover:bg-red-400 transition-colors"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500 hover:bg-yellow-400 transition-colors"></div>
                <div class="w-3 h-3 rounded-full bg-green-500 hover:bg-green-400 transition-colors"></div>
            </div>
            <span class="text-xs text-zinc-500 code-font ml-2 truncate">admin@localhost:~ login.sh</span>
        </div>

        <!-- Content Area -->
        <div class="p-8 pt-12 space-y-8">
            
            <!-- Header / Logo Section -->
            <div class="text-center mb-8">
                <i class="bi bi-terminal-fill text-cyan-400 w-12 h-12 mx-auto mb-3 animate-pulse"></i>
                <h1 class="text-xl font-semibold text-white tracking-wide uppercase code-font">System Access</h1>
                <p class="text-sm text-zinc-500 mt-1 code-font">root@server:~/auth</p>
            </div>

            <!-- Login Form -->
            <form action="#" method="POST" class="space-y-6">
                
                <!-- Input Group 1: Username/Email -->
                <div class="relative group">
                    <label for="username" class="block text-xs font-mono text-cyan-500 mb-1.5 uppercase tracking-wider">
                        > user_id
                    </label>
                    
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Enter username..." 
                        class="w-full bg-zinc-950 border border-zinc-700 rounded px-4 py-3 text-gray-200 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all duration-200 code-font placeholder:text-zinc-600"
                        autocomplete="off"
                    >
                    
                    <!-- Icon inside input (Optional visual flair) -->
                    <div class="absolute right-3 top-3.5 text-zinc-600 pointer-events-none">
                        <i class="bi bi-person-circle text-lg"></i>
                    </div>
                </div>

                <!-- Input Group 2: Password -->
                <div class="relative group">
                    <label for="password" class="block text-xs font-mono text-purple-500 mb-1.5 uppercase tracking-wider">
                        > passkey
                    </label>
                    
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="••••••••" 
                        class="w-full bg-zinc-950 border border-zinc-700 rounded px-4 py-3 text-gray-200 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all duration-200 code-font placeholder:text-zinc-600"
                    >

                    <!-- Toggle Visibility Icon -->
                    <button type="button" class="absolute right-3 top-3.5 text-zinc-500 hover:text-white transition-colors" aria-label="Toggle password visibility">
                        <i class="bi bi-eye-slash"></i>
                    </button>
                </div>

                <!-- Actions Row -->
                <div class="flex items-center justify-between pt-2">
                    <!-- Remember Me / Forgot Pass -->
                    <a href="#" class="text-sm text-zinc-400 hover:text-cyan-400 transition-colors code-font flex items-center gap-1">
                        <span class="opacity-70"><i class="bi bi-link-45deg"></i></span>
                        Reset Credentials?
                    </a>
                    
                    <!-- Submit Button -->
                    <button type="submit" class="bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-black font-bold py-2.5 px-6 rounded shadow-lg transform active:scale-95 transition-all duration-200 code-font whitespace-nowrap">
                        Execute Login
                    </button>
                </div>

            </form>

            <!-- Footer Info -->
            <div class="mt-8 pt-6 border-t border-zinc-800 text-center">
                <p class="text-[10px] text-zinc-600 code-font">
                    &copy; 2023 SecureCorp Inc.<br/>
                    Encrypted Connection (TLSv1.3)
                </p>
            </div>

        </div>
    </div>

</body>
</html>
