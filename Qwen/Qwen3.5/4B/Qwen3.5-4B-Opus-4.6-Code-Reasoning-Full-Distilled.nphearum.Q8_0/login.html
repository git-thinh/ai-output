<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Secure Access</title>
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Tailwind CSS v4 via CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center font-sans antialiased selection:bg-indigo-500 selection:text-white">

    <!-- Main Container -->
    <div class="w-full max-w-md px-4 sm:px-6 lg:px-8">
        
        <!-- Login Card -->
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden transition-all duration-300 hover:shadow-2xl">
            
            <!-- Header Section -->
            <div class="p-8 text-center border-b border-gray-100 bg-gradient-to-r from-blue-600 to-indigo-700">
                <h1 class="text-3xl font-bold tracking-tight text-white mb-2">Welcome Back</h1>
                <p class="text-blue-100 text-sm">Please enter your details to sign in.</p>
            </div>

            <!-- Form Body -->
            <form action="#" method="POST" class="p-8 space-y-6">
                
                <!-- Email Input Group -->
                <div class="space-y-2">
                    <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="bi bi-envelope-fill text-gray-400 group-focus-within:text-blue-500 transition-colors duration-200"></i>
                        </div>
                        <input type="email" id="email" 
                               name="email" 
                               required 
                               placeholder="name@example.com"
                               class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg leading-5 bg-gray-50 placeholder-gray-400 focus:outline-none focus:bg-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 sm:text-sm transition-all duration-200">
                    </div>
                </div>

                <!-- Password Input Group -->
                <div class="space-y-2">
                    <div class="flex items-center justify-between">
                        <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                        <a href="#" class="text-xs font-semibold text-blue-600 hover:text-blue-500 hover:underline decoration-dotted underline-offset-2">Forgot password?</a>
                    </div>
                    
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="bi bi-lock-fill text-gray-400 group-focus-within:text-blue-500 transition-colors duration-200"></i>
                        </div>
                        <input type="password" id="password" 
                               name="password" 
                               required 
                               placeholder="••••••••"
                               class="block w-full pl-10 pr-10 py-3 border border-gray-300 rounded-lg leading-5 bg-gray-50 placeholder-gray-400 focus:outline-none focus:bg-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 sm:text-sm transition-all duration-200">
                        
                        <!-- Static Eye Icon (No JS toggle) -->
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer opacity-50 hover:opacity-100 transition-opacity">
                             <span class="sr-only">Toggle visibility</span>
                             <i class="bi bi-eye-slash text-gray-400"></i>
                        </div>
                    </div>
                </div>

                <!-- Remember Me & Submit Row -->
                <div class="flex items-center justify-between pt-2">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" 
                               class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded cursor-pointer">
                        <label for="remember-me" class="ml-2 block text-sm text-gray-900 cursor-pointer select-none">Remember me</label>
                    </div>

                    <button type="submit" 
                            class="inline-flex justify-center items-center px-6 py-3 border border-transparent text-base font-medium rounded-lg shadow-sm text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-transform active:scale-[0.98]">
                            
                            Sign in
                            <i class="bi bi-arrow-right-short ml-2"></i>
                        </button>
                </div>

            </form>

            <!-- Footer Section -->
            <div class="bg-gray-50 p-6 text-center border-t border-gray-100">
                <p class="text-xs text-gray-500">
                    Don't have an account? <a href="#" class="font-semibold text-blue-600 hover:text-blue-500 underline decoration-dotted underline-offset-2">Sign up now</a>.
                </p>
            </div>
        </div>
    </div>

</body>
</html>
