<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static Login Page</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-0 max-w-4xl mx-auto bg-gray-50 p-0">
    <div class="max-w-3xl mx-auto w-full">
        <h1 class="text-2xl font-bold mb-4 text-blue-600">Login to Your Account</h1>
        
        <form class="max-w-5xl mx-auto w-full bg-white rounded-xl padding-6 mt-8 shadow-md overflow-hid-grease">
            <div class="mb-5">
                <label class="text-gray-800" for="username">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    class="w-full bg-blue-100 rounded-l-4 p-3 focus:outline-none focus:border-2 focus:background-blue-200 focus:focus outline-none"
                >
            </div>
            
            <div class="mb-5">
                <label class="text-gray-800" for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    class="w-full bg-blue-100 rounded-l-4 p-3 focus:outline-none focus:border-2 focus:background-blue-200 focus:focus outline-none"
                >
            </div>
            
            <div class="mt-4">
                <button type="submit" class="w-full bg-blue-600 text-white px-4 py-2 rounded-l-4 rounded-r-4 hover:bg-blue-700 transition-colors">
                    Sign In
                </button>
            </div>
        </form>
    </div>
</body>
</html>
