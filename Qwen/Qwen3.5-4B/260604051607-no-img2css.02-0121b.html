<!DOCTYPE html>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<div class="min-h-screen bg-gray-50 dark:bg-gray-900 flex items-center justify-center p-4 font-sans">
  <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg w-[380px] overflow-hidden border border-gray-100 dark:border-gray-700 transition-colors duration-300">
    <!-- Product Code -->
    <div class="px-4 py-2 text-xs text-gray-500 dark:text-gray-400 font-medium tracking-wide">
      25214 - 742
    </div>

    <!-- Title & Fit -->
    <div class="px-6 pt-3 pb-2">
      <h1 class="text-[28px] font-bold text-gray-900 dark:text-white leading-tight mb-1">
        Trousers, men
      </h1>
      <p class="text-[16px] text-gray-500 dark:text-gray-400 font-medium">
        Classic fit
      </p>
    </div>

    <!-- Color Selection -->
    <div class="px-6 py-3 border-t border-gray-100 dark:border-gray-700">
      <div class="flex items-center justify-between">
        <span class="text-[16px] text-gray-900 dark:text-white font-medium">
          Midnight Blue / Lightgrey Stripes
        </span>
        
        <!-- Color Swatches -->
        <div class="flex gap-3">
          <!-- Swatch 1: Solid Dark Blue -->
          <div class="w-6 h-6 rounded-full bg-[#0f2c4e] border border-gray-200 dark:border-gray-600 shadow-sm"></div>
          
          <!-- Swatch 2: Striped Pattern (Simulated with CSS) -->
          <div class="w-6 h-6 rounded-full bg-[#1a3a5c] border border-gray-200 dark:border-gray-600 shadow-sm relative overflow-hidden">
             <div class="absolute inset-0 w-full h-full opacity-30" style="background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, #ffffff 5px, #ffffff 10px);"></div>
          </div>

          <!-- Swatch 3: Solid Medium Blue -->
          <div class="w-6 h-6 rounded-full bg-[#2b6cb0] border border-gray-200 dark:border-gray-600 shadow-sm"></div>
          
          <!-- Swatch 4: Solid Black -->
          <div class="w-6 h-6 rounded-full bg-black border border-gray-200 dark:border-gray-600 shadow-sm"></div>
        </div>
      </div>
    </div>

    <!-- Price -->
    <div class="px-6 py-4 bg-gray-50 dark:bg-gray-800/50 border-t border-gray-100 dark:border-gray-700">
      <div class="flex items-center gap-2">
        <span class="text-[24px] font-bold text-gray-900 dark:text-white">79</span>
        <span class="text-[24px] font-bold text-gray-900 dark:text-white">£</span>
      </div>
    </div>
  </div>
</div>
