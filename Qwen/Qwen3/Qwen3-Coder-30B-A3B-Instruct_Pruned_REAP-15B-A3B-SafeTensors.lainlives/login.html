<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f8f8;
        }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen bg-gray-100">
    <div class="bg-white rounded-lg shadow-md p-8 w-full max-w-sm md:max-w-md">
        <!-- Logo -->
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-blue-600">Login to Your Account</h1>
            <p class="text-gray-500 mt-2">Enter your credentials below</p>
        </div>

        <!-- Form -->
        <form action="#" method="post" class="space-y-4">
            <!-- Email Input -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input 
                    type="email"
                    id="email"
                    name="email"
                    required
                    placeholder="your-email@example.com"
                    class="
                        w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 transition duration-200
                        placeholder:text-gray-500 placeholder:text-sm
                    "
                >
            </div>

            <!-- Password Input -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <input 
                        type="password"
                        id="password"
                        name="password"
                        required
                        placeholder="Enter your password"
                        class="
                            w-full px-4 py-2 pr-10 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 transition duration-200
                            placeholder:text-gray-500 placeholder:text-sm
                        "
                    >
                    <button type="button" class="absolute right-3 top-1/2 transform translate-y-[-50%] text-blue-500 hover:text-blue-700">
                        <svg xmlns="http://www.w3.org/1999/xhtml" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-width="2" class="w-5 h-5">
                            <path d="M12 12C14.209 12 16 10.209 16 8 16 5.209 14.209 4 12 4 9.791 4 8 5.209 8 8 8 10.209 9.791 12"></path>
                            <path d="M12 12C9.791 12 8 10.209 8 8 8 5.209 9.791 4 12 4 14.209 4 16 5.209 16 8 16 10.209 14.209 12"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Remember & Forgot Links -->
            <div class="flex justify-between items-center mt-2">
                <div class="flex items-center">
                    <input type="checkbox" id="remember" class="mr-2 cursor-pointer">
                    <label for="remember" class="text-sm text-gray-600">Remember me</label>
                </div>
                <a href="#" class="text-sm text-blue-600 hover:underline">Forgot Password?</a>
            </div>

            <!-- Submit Button -->
            <button 
                type="submit"
                class="
                    w-full bg-blue-600 text-white py-3 px-4 rounded-lg font-medium hover:bg-blue-700 transition duration-200 shadow-md hover:shadow-lg
                    focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50
                "
            >
                Sign In
            </button>
        </form>

        <!-- Social Login Options -->
        <div class="mt-6">
            <p class="text-center text-gray-600 mb-3">Or sign in with</p>
            <div class="flex gap-3 justify-center">
                <button class="bg-white border border-gray-300 p-2 rounded-lg flex items-center justify-center w-1/3 md:w-auto">
                    <img src="https://cdn-icons.com/css/icons8-google.svg" alt="Google" width="20" height="20"/>
                    <span class="ml-2 hidden sm:inline">Google</span>
                </button>
                <button class="bg-white border border-gray-300 p-2 rounded-lg flex items-center justify-center w-1/3 md:w-auto">
                    <img src="https://cdn-icons.com/css/icons8-facebook.svg" alt="Facebook" width="20" height="20"/>
                    <span class="ml-2 hidden sm:inline">Facebook</span>
                </button>
            </div>
        </div>

        <!-- Footer Link -->
        <div class="mt-6 text-center">
            <p class="text-gray-600 text-sm">
                Don't have an account? 
                <a href="#" class="text-blue-600 font-medium hover:underline">Sign up now</a>
            </p>
        </div>
    </div>
</body>
</html>
