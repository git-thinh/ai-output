<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- Tailwind CSS v4 Build -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

    <!-- Bootstrap Icons Web Font -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1/icons.css">

    <style>
        /* Custom styles if needed */
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-white rounded-xl shadow-lg overflow-hidden mx-auto">
        
        <!-- Header -->
        <header class="p-8 text-center border-b border-gray-200">
            <h1 class="text-2xl font-bold text-indigo-700">Code<span class="text-primary">Page</span></h1>
            <p class="text-sm mt-1 text-gray-600">Log in to your account</p>
        </header>

        <!-- Login Form -->
        <form class="p-8 space-y-6">
            
            <!-- Email Input -->
            <div class="relative">
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
                <input id="email" type="email" placeholder="Enter your email" 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                       required>
            </div>

            <!-- Password Input -->
            <div class="relative">
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input id="password" type="password" placeholder="Enter your password" 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                       required>
            </div>

            <!-- Remember Me Checkbox -->
            <div class="flex items-center">
                <input id="remember-me" type="checkbox" class="mr-2">
                <label for="remember-me" class="text-sm text-gray-600 cursor-pointer">Remember me</label>
            </div>

            <!-- Forgot Password Link -->
            <a href="#" class="inline-block align-middle text-xs text-indigo-600 hover:text-indigo-900 underline">Forgot password?</a>

            <!-- Submit Button -->
            <button type="submit" 
                    class="w-full bg-indigo-600 text-white py-3 rounded-lg font-medium hover:bg-indigo-700 transition-colors duration-200 flex items-center justify-center">
                <i class="bi bi-key-fill mr-3 text-base"></i> Log In
            </button>
        </form>
    </div>

</body>
</html>
