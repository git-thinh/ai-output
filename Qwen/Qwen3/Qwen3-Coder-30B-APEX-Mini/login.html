<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Login Page</title>
    <!-- Tailwind CSS v4 -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-radius: 16px;
            overflow: hidden;
        }
        .social-btn:hover {
            transform: translateY(-2px);
            transition: all 0.2s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="w-full max-w-md p-6 bg-white rounded-xl shadow-lg login-card">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Welcome Back</h1>
            <p class="text-gray-600 mt-2">Sign in to continue to your account</p>
        </div>

        <form class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
                        <i class="bi bi-envelope"></i>
                    </span>
                    <input id="email" type="email" placeholder="you@example.com" 
                           class="pl-10 w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
                        <i class="bi bi-lock"></i>
                    </span>
                    <input id="password" type="password" placeholder="••••••••" 
                           class="pl-10 w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                </div>
            </div>

            <div class="flex justify-between items-center">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" 
                           class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
                    <label for="remember-me" class="ml-2 block text-sm text-gray-700">Remember me</label>
                </div>
                <a href="#" class="text-sm text-indigo-600 hover:text-indigo-500">Forgot password?</a>
            </div>

            <button type="submit" 
                    class="w-full bg-indigo-600 text-white py-3 px-4 rounded-lg hover:bg-indigo-700 transition duration-300 ease-in-out transform hover:-translate-y-1 shadow-md">
                Sign in
            </button>
        </form>

        <div class="mt-8">
            <div class="relative">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-300"></div>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="px-2 bg-white text-gray-500">Or continue with</span>
            </div>
            </div>

            <div class="mt-6 grid grid-cols-3 gap-3">
                <button class="social-btn bg-white p-3 rounded-lg border border-gray-300 flex items-center justify-center hover:bg-gray-50">
                    <i class="bi bi-google text-red-500 text-xl"></i>
                </button>
                <button class="social-btn bg-white p-3 rounded-lg border border-gray-300 flex items-center justify-center hover:bg-gray-50">
                    <i class="bi bi-facebook text-blue-600 text-xl"></i>
                </button>
                <button class="social-btn bg-white p-3 rounded-lg border border-gray-300 flex items-center justify-center hover:bg-gray-50">
                    <i class="bi bi-github text-gray-900 text-xl"></i>
                </button>
            </div>
        </div>

        <div class="mt-8 text-center">
            <p class="text-sm text-gray-600">
                Don't have an account? 
                <a href="#" class="font-medium text-indigo-600 hover:text-indigo-500">Sign up here</a>
            </p>
        </div>
    </div>
</body>
</html>
