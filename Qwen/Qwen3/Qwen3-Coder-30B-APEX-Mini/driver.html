<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Drive - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script>
        tailwindcss.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4285F4',
                        secondary: '#34A853',
                        accent: '#FBBC05',
                        danger: '#EA4335'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <i class="bi bi-cloud-fill text-primary text-2xl mr-2"></i>
                    <span class="text-xl font-semibold text-gray-900">Cloud Drive</span>
                </div>
                <div class="flex items-center space-x-4">
                    <button class="p-2 rounded-full hover:bg-gray-100">
                        <i class="bi bi-search text-gray-500"></i>
                    </button>
                    <button class="p-2 rounded-full hover:bg-gray-100">
                        <i class="bi bi-bell text-gray-500"></i>
                    </button>
                    <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-white">
                        <span class="text-sm font-medium">U</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex flex-col md:flex-row">
            <!-- Sidebar -->
            <div class="w-full md:w-64 mb-6 md:mb-0 md:mr-6">
                <div class="bg-white rounded-lg shadow-sm p-4">
                    <div class="flex items-center mb-6">
                        <i class="bi bi-folder-plus text-primary mr-2"></i>
                        <button class="text-sm font-medium text-primary hover:underline">New Folder</button>
                    </div>
                    <div class="space-y-2">
                        <div class="flex items-center justify-between p-2 bg-blue-50 rounded-lg">
                            <div class="flex items-center">
                                <i class="bi bi-house text-gray-500 mr-2"></i>
                                <span class="text-sm font-medium">My Drive</span>
                            </div>
                        </div>
                        <div class="flex items-center p-2 hover:bg-gray-100 rounded-lg">
                            <i class="bi bi-star text-gray-500 mr-2"></i>
                            <span class="text-sm">Starred</span>
                        </div>
                        <div class="flex items-center p-2 hover:bg-gray-100 rounded-lg">
                            <i class="bi bi-clock text-gray-500 mr-2"></i>
                            <span class="text-sm">Recent</span>
                        </div>
                        <div class="flex items-center p-2 hover:bg-gray-100 rounded-lg">
                            <i class="bi bi-download text-gray-500 mr-2"></i>
                            <span class="text-sm">Downloads</span>
                        </div>
                        <div class="flex items-center p-2 hover:bg-gray-100 rounded-lg">
                            <i class="bi bi-trash text-gray-500 mr-2"></i>
                            <span class="text-sm">Trash</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Content Area -->
            <div class="flex-1">
                <!-- Breadcrumb -->
                <div class="flex items-center mb-6">
                    <span class="text-sm text-gray-500 mr-1">Home</span>
                    <i class="bi bi-chevron-right text-gray-400 mr-1"></i>
                    <span class="text-sm font-medium text-gray-900">Documents</span>
                </div>

                <!-- Toolbar -->
                <div class="bg-white rounded-lg shadow-sm p-4 mb-6">
                    <div class="flex flex-wrap items-center justify-between gap-4">
                        <div class="flex items-center space-x-2">
                            <button class="p-2 rounded-lg hover:bg-gray-100">
                                <i class="bi bi-arrow-clockwise text-gray-500"></i>
                            </button>
                            <button class="p-2 rounded-lg hover:bg-gray-100">
                                <i class="bi bi-three-dots text-gray-500"></i>
                            </button>
                        </div>
                        <div class="flex items-center space-x-4">
                            <button class="px-4 py-2 bg-primary text-white rounded-lg text-sm font-medium hover:bg-blue-600">
                                Upload File
                            </button>
                            <button class="p-2 rounded-lg hover:bg-gray-100">
                                <i class="bi bi-grid text-gray-500"></i>
                            </button>
                            <button class="p-2 rounded-lg hover:bg-gray-100">
                                <i class="bi bi-list text-gray-500"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- File Grid -->
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                    <!-- Folder Item -->
                    <div class="bg-white rounded-lg shadow-sm p-4 hover:shadow-md transition-shadow cursor-pointer">
                        <div class="flex flex-col items-center">
                            <div class="w-16 h-16 bg-blue-100 rounded-lg flex items-center justify-center mb-3">
                                <i class="bi bi-folder-fill text-blue-600 text-2xl"></i>
                            </div>
                            <h3 class="text-sm font-medium text-gray-900 truncate">Documents</h3>
                            <p class="text-xs text-gray-500 mt-1">24 items</p>
                        </div>
                    </div>

                    <!-- File Item -->
                    <div class="bg-white rounded-lg shadow-sm p-4 hover:shadow-md transition-shadow cursor-pointer">
                        <div class="flex flex-col items-center">
                            <div class="w-16 h-16 bg-gray-100 rounded-lg flex items-center justify-center mb-3">
                                <i class="bi bi-file-earmark-pdf text-red-600 text-2xl"></i>
                            </div>
                            <h3 class="text-sm font-medium text-gray-900 truncate">Report.pdf</h3>
                            <p class="text-xs text-gray-500 mt-1">2.5 MB</p>
                        </div>
                    </div>

                    <!-- File Item -->
                    <div class="bg-white rounded-lg shadow-sm p-4 hover:shadow-md transition-shadow cursor-pointer">
                        <div class="flex flex-col items-center">
                            <div class="w-16 h-16 bg-gray-100 rounded-lg flex items-center justify-center mb-3">
                                <i class="bi bi-image text-green-600 text-2xl"></i>
                            </div>
                            <h3 class="text-sm font-medium text-gray-900 truncate">Photo.jpg</h3>
                            <p class="text-xs text-gray-500 mt-1">1.2 MB</p>
                        </div>
                    </div>

                    <!-- File Item -->
                    <div class="bg-white rounded-lg shadow-sm p-4 hover:shadow-md transition-shadow cursor-pointer">
                        <div class="flex flex-col items-center">
                            <div class="w-16 h-16 bg-gray-100 rounded-lg flex items-center justify-center mb-3">
                                <i class="bi bi-file-earmark-word text-blue-600 text-2xl"></i>
                            </div>
                            <h3 class="text-sm font-medium text-gray-900 truncate">Presentation.docx</h3>
                            <p class="text-xs text-gray-500 mt-1">3.1 MB</p>
                        </div>
                    </div>

                    <!-- Folder Item -->
                    <div class="bg-white rounded-lg shadow-sm p-4 hover:shadow-md transition-shadow cursor-pointer">
                        <div class="flex flex-col items-center">
                            <div class="w-16 h-16 bg-blue-100 rounded-lg flex items-center justify-center mb-3">
                                <i class="bi bi-folder-fill text-blue-600 text-2xl"></i>
                            </div>
                            <h3 class="text-sm font-medium text-gray-900 truncate">Projects</h3>
                            <p class="text-xs text-gray-500 mt-1">12 items</p>
                        </div>
                    </div>

                    <!-- File Item -->
                    <div class="bg-white rounded-lg shadow-sm p-4 hover:shadow-md transition-shadow cursor-pointer">
                        <div class="flex flex-col items-center">
                            <div class="w-16 h-16 bg-gray-100 rounded-lg flex items-center justify-center mb-3">
                                <i class="bi bi-file-earmark-excel text-green-600 text-2xl"></i>
                            </div>
                            <h3 class="text-sm font-medium text-gray-900 truncate">Data.xlsx</h3>
                            <p class="text-xs text-gray-500 mt-1">1.8 MB</p>
                        </div>
                    </div>
                </div>

                <!-- Empty State -->
                <div class="mt-12 text-center py-12">
                    <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="bi bi-cloud-download text-gray-400 text-2xl"></i>
                    </div>
                    <h3 class="text-lg font-medium text-gray-900 mb-2">No files yet</h3>
                    <p class="text-gray-500 mb-4">Upload your first file to get started</p>
                    <button class="px-4 py-2 bg-primary text-white rounded-lg text-sm font-medium hover:bg-blue-600">
                        Upload File
                    </button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
