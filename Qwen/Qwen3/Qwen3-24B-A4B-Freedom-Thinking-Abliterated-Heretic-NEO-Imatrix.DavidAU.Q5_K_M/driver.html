<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud Drive Manager</title>
  <!-- Tailwind CSS -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    /* Custom Tailwind styles */
    .dashboard-grid {
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }
    .card {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
    }
  </style>
</head>
<body class="font-sans text-gray-800 bg-gray-50 min-h-screen">

  <!-- Header -->
  <header class="bg-white shadow-md sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <i class="bi bi-cloud-upload text-3xl text-indigo-600"></i>
        <span class="text-xl font-bold text-indigo-800">Cloud Drive</span>
      </div>
      <div class="flex items-center gap-4">
        <a href="#" class="text-gray-600 hover:text-indigo-600 flex items-center gap-1">
          <i class="bi bi-gear text-xl"></i>
          <span>Settings</span>
        </a>
        <a href="#" class="text-gray-600 hover:text-indigo-600 flex items-center gap-1">
          <i class="bi bi-person-circle text-xl"></i>
          <span>Profile</span>
        </a>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      
      <!-- Stats Cards -->
      <div class="lg:col-span-1 space-y-6">
        <!-- Total Folders -->
        <div class="bg-white p-6 rounded-xl shadow-md border border-gray-100">
          <div class="flex items-center justify-between">
            <div>
              <h3 class="text-lg font-semibold text-gray-700">Total Folders</h3>
              <p class="text-3xl font-bold text-indigo-600">12</p>
            </div>
            <i class="bi bi-folder text-3xl text-indigo-500"></i>
          </div>
        </div>

        <!-- Total Files -->
        <div class="bg-white p-6 rounded-xl shadow-md border border-gray-100">
          <div class="flex items-center justify-between">
            <div>
              <h3 class="text-lg font-semibold text-gray-700">Total Files</h3>
              <p class="text-3xl font-bold text-indigo-600">45</p>
            </div>
            <i class="bi bi-file-earmark-text text-3xl text-indigo-500"></i>
          </div>
        </div>

        <!-- Storage Usage -->
        <div class="bg-white p-6 rounded-xl shadow-md border border-gray-100">
          <div class="flex items-center justify-between">
            <div>
              <h3 class="text-lg font-semibold text-gray-700">Storage Usage</h3>
              <p class="text-3xl font-bold text-indigo-600">28.5 GB / 100 GB</p>
            </div>
            <i class="bi bi-hdd-stacked text-3xl text-indigo-500"></i>
          </div>
        </div>
      </div>

      <!-- Dashboard Grid -->
      <div class="lg:col-span-2">
        <div class="bg-white rounded-xl shadow-md border border-gray-100 p-6">
          <h2 class="text-xl font-semibold text-gray-800 mb-6">My Drive</h2>
          
          <div class="relative">
            <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
              <i class="bi bi-search text-gray-400"></i>
            </div>
            <input 
              type="text" 
              placeholder="Search files and folders..." 
              class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
            >
          </div>

          <div class="mt-6">
            <!-- Folders Grid -->
            <div class="dashboard-grid gap-4">
              <!-- Folder Card 1 -->
              <div class="bg-gray-50 border border-gray-100 rounded-lg p-4 flex items-center gap-3 hover:shadow-md transition-shadow">
                <i class="bi bi-folder text-indigo-500 text-xl"></i>
                <div>
                  <h3 class="font-medium text-gray-800">Documents</h3>
                  <p class="text-sm text-gray-500">12 files</p>
                </div>
              </div>
              
              <!-- Folder Card 2 -->
              <div class="bg-gray-50 border border-gray-100 rounded-lg p-4 flex items-center gap-3 hover:shadow-md transition-shadow">
                <i class="bi bi-folder text-indigo-500 text-xl"></i>
                <div>
                  <h3 class="font-medium text-gray-800">Pictures</h3>
                  <p class="text-sm text-gray-500">45 images</p>
                </div>
              </div>
              
              <!-- Folder Card 3 -->
              <div class="bg-gray-50 border border-gray-100 rounded-lg p-4 flex items-center gap-3 hover:shadow-md transition-shadow">
                <i class="bi bi-folder text-indigo-500 text-xl"></i>
                <div>
                  <h3 class="font-medium text-gray-800">Videos</h3>
                  <p class="text-sm text-gray-500">8 videos</p>
                </div>
              </div>
              
              <!-- Folder Card 4 -->
              <div class="bg-gray-50 border border-gray-100 rounded-lg p-4 flex items-center gap-3 hover:shadow-md transition-shadow">
                <i class="bi bi-folder text-indigo-500 text-xl"></i>
                <div>
                  <h3 class="font-medium text-gray-800">Downloads</h3>
                  <p class="text-sm text-gray-500">23 files</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-white border-t border-gray-100 mt-12 py-6">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-gray-500 text-sm">
      <p>&copy; 2024 Cloud Drive Manager. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
