<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    
    <!-- Tailwind CSS v4 via CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    
    <!-- Bootstrap Icons via CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-50 to-indigo-50">
    <div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-xl border border-indigo-100">
        <div class="text-center mb-8">
            <div class="inline-block text-4xl mb-4">
                <i class="bi bi-person-circle text-indigo-600"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Welcome Back</h1>
            <p class="text-gray-500">Log in to continue your session</p>
        </div>

        <form class="space-y-6" action="#" method="post">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                    <i class="bi bi-envelope me-2 text-indigo-500"></i>Email Address
                </label>
                <input type="email" id="email" name="email" 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 
                       transition duration-200 ease-in-out placeholder-gray-400"
                       placeholder="your@email.com" required>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                    <i class="bi bi-lock me-2 text-indigo-500"></i>Password
                </label>
                <div class="relative">
                    <input type="password" id="password" name="password" 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 
                           transition duration-200 ease-in-out placeholder-gray-400"
                           placeholder="•••••••" required>
                    <button type="button" class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600">
                        <i class="bi bi-eye text-lg"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center">
                <input type="checkbox" id="remember" name="remember" class="h-4 w-4 text-indigo-600">
                <label for="remember" class="ml-2 text-sm text-gray-600">Remember me</label>
                <a href="#" class="ml-auto text-sm text-indigo-600 hover:text-indigo-800 font-medium">Forgot password?</a>
            </div>

            <div>
                <button type="submit" 
                        class="w-full py-3 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 transition duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    <i class="bi bi-lock-open me-2"></i>Login to Your Account
                </button>
            </div>

            <div class="text-center pt-4 border-t border-gray-100">
                <p class="text-sm text-gray-500">Don't have an account? <a href="#" class="text-indigo-600 hover:text-indigo-800 font-medium">Sign up</a></p>
            </div>
        </form>
    </div>
</body>
</html>
