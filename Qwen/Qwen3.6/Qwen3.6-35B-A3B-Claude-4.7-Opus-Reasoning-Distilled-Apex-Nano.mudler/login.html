<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
 
    <style>
        .bg-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23ffffff' stroke-opacity='0.05' stroke-width='1'%3E%3Cpath d='M0 60L60 0H27.09L0 27Z'/%3E%3Cpath d='M60 60V27.09L0 60'/%3E%3C/g%3E%3C/svg%3E");
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-purple-900 to-indigo-900 flex items-center justify-center p-4 relative overflow-hidden">
    
    <!-- Background Pattern -->
    <div class="absolute inset-0 bg-pattern opacity-50 pointer-events-none"></div>
    
    <!-- Decorative Circles -->
    <div class="absolute top-[-10%] left-[10%] w-[300px] h-[300px] rounded-full bg-purple-500/10 blur-3xl animate-pulse"></div>
    <div class="absolute bottom-[-10%] right-[10%] w-[350px] h-[350px] rounded-full bg-blue-500/10 blur-3xl animate-pulse delay-1000"></div>
    <div class="absolute top-[40%] right-[30%] w-[200px] h-[200px] rounded-full bg-cyan-500/10 blur-3xl animate-bounce delay-500"></div>

    <!-- Login Card -->
    <div class="w-full max-w-md mx-auto z-10">
        
        <!-- Header Section -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-white/10 backdrop-blur-sm border border-white/10 shadow-lg mb-4">
                <i class="bi bi-shield-lock-fill text-3xl text-white"></i>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">Welcome Back</h1>
            <p class="mt-2 text-gray-400 text-sm">Sign in to continue to your account</p>
        </div>

        <!-- Form Card -->
        <div class="bg-black/20 backdrop-blur-xl border border-white/10 rounded-2xl p-8 shadow-2xl">
            
            <!-- Social Login Buttons -->
            <button type="button" class="flex items-center justify-center gap-3 w-full py-3 px-4 rounded-xl bg-white hover:bg-gray-100 transition-colors duration-200 cursor-pointer group">
                <svg width="18" height="18" viewBox="0 0 47.59 44.56">
                    <path d="M23.79,0C13.13,0,4.18,6.62,0.87,15.49c-0.52,1.38-0.87,2.84-1.03,4.34v14.88c0.16,1.5,0.51,2.96,1.03,4.34C4.18,37.94,13.13,44.56,23.79,44.56c10.66,0,19.61-6.62,22.92-15.49c0.52-1.38,0.87-2.84,1.03-4.34V15.49C43.4,6.62,34.45,0,23.79,0z" fill="#fff"/>
                    <g><path d="M23.79,10.71l10.71,0L34.69,21.42L23.79,32.13L12.88,21.42L13.08,21.42Z" fill="#ea4335"/><path d="M1.03,15.49L12.88,21.42L10.71,32.13L1.03,29.27Z" fill="#fbbc05"/></g>
                </svg>
                <span class="text-sm font-medium text-gray-800">Continue with Google</span>
            </button>

            <div class="my-6 flex items-center gap-4">
                <div class="flex-1 h-[1px] bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
                <span class="text-xs uppercase tracking-widest text-gray-500">or sign in with email</span>
                <div class="flex-1 h-[1px] bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
            </div>

            <!-- Form Fields -->
            <form action="#" method="post" autocomplete="off">
                
                <!-- Email Field -->
                <label for="email" class="block mb-2 text-sm font-medium text-gray-300">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="name@example.com" 
                    required
                    class="w-full px-4 py-3 rounded-xl border border-white/10 focus:border-purple-500 focus:ring-2 focus:ring-purple-500/20 outline-none transition-all duration-200 bg-white/5 backdrop-blur-sm text-white placeholder:text-gray-500 cursor-pointer hover:bg-white/10 hover:border-white/20"
                />

                <!-- Password Field -->
                <label for="password" class="mt-4 block mb-2 text-sm font-medium text-gray-300">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="••••••••" 
                    required
                    class="w-full px-4 py-3 rounded-xl border border-white/10 focus:border-purple-500 focus:ring-2 focus:ring-purple-500/20 outline-none transition-all duration-200 bg-white/5 backdrop-blur-sm text-white placeholder:text-gray-500 cursor-pointer hover:bg-white/10 hover:border-white/20"
                />

                <!-- Remember Me & Forgot Password -->
                <div class="flex items-center justify-between mt-6">
                    <label for="remember-me" class="inline-flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" id="remember-me" name="remember_me" value="yes" class="peer w-4 h-4 accent-purple-500 cursor-pointer"/>
                        <span class="text-sm text-gray-400 peer-hover:text-gray-300 transition-colors">Remember me</span>
                    </label>
                    <a href="#" class="text-sm text-purple-400 hover:text-purple-300 transition-colors underline-offset-4 hover:underline">Forgot password?</a>
                </div>

                <!-- Submit Button -->
                <button 
                    type="submit" 
                    class="mt-8 w-full flex items-center justify-center gap-2 py-3.5 rounded-xl bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 text-white font-semibold shadow-lg shadow-purple-500/25 transition-all duration-200 active:scale-[0.98] cursor-pointer"
                >
                    <i class="bi bi-arrow-right"></i>
                    Sign In
                </button>
            </form>
        </div>

        <!-- Footer Links -->
        <p class="text-center text-sm text-gray-400 mt-6">
            Don't have an account? 
            <a href="#" class="text-purple-400 hover:text-purple-300 transition-colors underline-offset-4 hover:underline">Create one now</a>
        </p>
    </div>
</body>
</html>
