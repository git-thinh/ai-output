<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page with Social Auth</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

    <!-- Card Container -->
    <div class="bg-white w-full max-w-md p-8 rounded-xl shadow-md">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <i class="bi bi-box-seam text-4xl text-blue-600 mb-2 block"></i>
            <h1 class="text-3xl font-bold text-gray-800">Welcome Back</h1>
            <p class="text-gray-500 mt-2">Please enter your details to sign in.</p>
        </div>

        <!-- Form -->
        <form class="space-y-6 space-y-6" action="#" method="POST">
            
            <!-- Email Input -->
            <div>
                <label for="email" class="block text-gray-700 font-medium mb-2">Email address</label>
                <div class="relative">
                    <span class="absolute inset-y-3 left-3 flex items-center">
                        <i class="bi bi-envelope text-gray-400"></i>
                    </span>
                    <input 
                        type="email" 
                        name="email" 
                        id="email" 
                        placeholder="name@example.com"
                        class="w-full rounded-md border-gray-300 pl-10 pr-3 py-3 focus:border-blue-500 focus:ring focus:ring-blue-200 outline-none transition-all border bg-white" 
                        required
                    />
                </div>
            </div>

            <!-- Password Input -->
            <div>
                <label for="password" class="block text-gray-700 font-medium mb-2">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-3 left-3 flex items-center">
                        <i class="bi bi-lock text-gray-400"></i>
                    </span>
                    <input 
                        type="password" 
                        name="password" 
                        id="password" 
                        placeholder="••••••••"
                        class="w-full rounded-md border-gray-300 pl-10 pr-3 py-3 focus:border-blue-500 focus:ring focus:ring-blue-200 outline-none transition-all border bg-white" 
                        required
                    />
                </div>
            </div>

            <!-- Remember Me & Forgot Password -->
            <div class="flex items-center justify-between">
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                    <span class="text-gray-600 text-sm">Remember me</span>
                </label>
                <a href="#" class="text-sm text-blue-600 hover:underline hover:text-blue-800 transition-color">Forgot password?</a>
            </div>

            <!-- Submit Button -->
            <button 
                type="submit" 
                class="flex w-full items-center justify-center space-x-2 rounded-md border border-transparent bg-blue-600 px-3 py-3 text-sm font-semibold text-white outline-none hover:bg-blue-700 transition-all cursor-pointer"
            >
                <span>Sign in</span>
                <i class="bi bi-arrow-right"></i>
            </button>
        </form>

        <!-- Divider -->
        <div class="relative flex items-center justify-center my-6">
            <div class="absolute inset-0 flex items-center justify-center w-full">
                <div class="w-full h-px bg-gray-200"></div>
            </div>
            <div class="relative px-3 text-sm text-gray-500 bg-white z-10">
                Or continue with
            </div>
        </div>

        <!-- Social Login Buttons -->
        <div class="grid grid-cols-3 gap-3">
            
            <!-- Google Button -->
            <button type="button" class="flex items-center justify-center bg-white border border-gray-300 rounded-md px-3 py-3 hover:bg-gray-50 transition-all cursor-pointer">
                <i class="bi bi-google text-xl"></i>
            </button>

            <!-- Facebook Button -->
            <button type="button" class="flex items-center justify-center bg-white border border-gray-300 rounded-md px-3 py-3 hover:bg-gray-50 transition-all cursor-pointer">
                <i class="bi bi-facebook text-xl text-blue-700"></i>
            </button>

            <!-- GitHub Button -->
            <button type="button" class="flex items-center justify-center bg-white border border-gray-300 rounded-md px-3 py-3 hover:bg-gray-50 transition-all cursor-pointer">
                <i class="bi bi-github text-xl text-gray-800"></i>
            </button>
        </div>

        <!-- Footer -->
        <div class="mt-8 text-center text-gray-500 text-sm">
            Don't have an account? 
            <a href="#" class="text-blue-600 hover:underline hover:text-blue-800 transition-color font-medium">Sign up</a>
        </div>
    </div>

</body>
</html>
