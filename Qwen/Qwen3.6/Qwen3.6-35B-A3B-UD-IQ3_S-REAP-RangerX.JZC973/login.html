<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-primary: #6366f1;
            --color-primary-dark: #4e52c7;
            --color-surface: #ffffff;
            --color-bg-light: #f0f0ff;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #6366f1 50%, #9fc4d4 100%);
        }

        .glass-card {
            backdrop-filter: blur(16px) saturate(1.5);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .input-focus:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
            border-color: #6366f1;
        }

        .btn-glow:hover {
            box-shadow: 0 6px 24px rgba(99, 102, 241, 0.45);
        }

        .social-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
        }

        .floating-label {
            position: absolute;
            top: -8px;
            left: 16px;
            font-size: 12px;
            color: #6366f1;
            padding: 0 6px;
            background: white;
            pointer-events: none;
        }

        .divider-line::before {
            content: "";
            display: block;
            height: 1px;
            background: #e2e2ef;
            width: 100%;
            position: relative;
            top: 14px;
        }
    </style>
</head>

<body class="flex items-center justify-center p-4 sm:p-8">

    <!-- ==================== LOGIN CARD ==================== -->
    <div class="w-full max-w-md mx-auto">

        <!-- Card Container -->
        <div class="glass-card bg-white/90 rounded-3xl shadow-2xl overflow-hidden">

            <!-- ===== HEADER / LOGO SECTION ===== -->
            <div class="bg-primary text-white px-8 pt-10 pb-8 text-center">
                <i class="bi bi-shield-lock-fill text-5xl mb-4 inline-block"></i>
                <h1 class="text-3xl font-bold tracking-tight">Welcome Back</h1>
                <p class="mt-2 text-sm opacity-75">Sign in to continue to your dashboard</p>
            </div>

            <!-- ===== FORM BODY ===== -->
            <form action="#" method="post" class="px-8 py-8 space-y-6">

                <!-- Email Field -->
                <label class="block">
                    <span class="mb-2 block text-sm font-semibold text-gray-700">Email Address</span>
                    <div
                        class="relative flex items-center border border-gray-200 rounded-xl transition-all duration-200 input-focus">
                        <i class="bi bi-envelope-fill ml-3 mr-2 text-gray-400 text-lg"></i>
                        <input type="email" name="email" placeholder="you@example.com" required
                            class="w-full py-3 pr-3 pl-1 bg-transparent text-gray-800 placeholder:text-gray-400 text-base" />
                    </div>
                </label>

                <!-- Password Field -->
                <label class="block">
                    <span class="mb-2 block text-sm font-semibold text-gray-700">Password</span>
                    <div
                        class="relative flex items-center border border-gray-200 rounded-xl transition-all duration-200 input-focus">
                        <i class="bi bi-key-fill ml-3 mr-2 text-gray-400 text-lg"></i>
                        <input type="password" name="password" placeholder="Enter your password" required minlength="6"
                            class="w-full py-3 pr-3 pl-1 bg-transparent text-gray-800 placeholder:text-gray-400 text-base" />
                    </div>
                </label>

                <!-- Remember Me + Forgot Link Row -->
                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-2 cursor-pointer select-none">
                        <input type="checkbox" name="remember" value="true"
                            class="accent-indigo w-4 h-4 rounded accent-primary" />
                        <span class="text-sm text-gray-600">Remember me</span>
                    </label>
                    <a href="#" class="text-sm font-medium text-primary hover:underline underline-offset-4">Forgot?</a>
                </div>

                <!-- Submit Button -->
                <button type="submit"
                    class="btn-glow w-full py-3.5 rounded-xl bg-primary text-white text-base font-bold tracking-wide uppercase transition-all duration-300 cursor-pointer">
                    <i class="bi bi-box-arrow-right mr-2 align-middle inline-block"></i> Sign In
                </button>

            </form>

            <!-- ===== DIVIDER ===== -->
            <div class="px-8 relative divider-line my-6">
                <span
                    class="absolute left-half translate-x--1/2 top-[14px] px-3 bg-white text-xs font-semibold text-gray-400 z-10">or
                    continue with</span>
            </div>

            <!-- ===== SOCIAL BUTTONS ===== -->
            <div class="grid grid-cols-3 gap-3 px-8 pb-8">

                <!-- Google -->
                <a href="#"
                    class="social-btn flex flex-col items-center justify-center gap-1 py-3 rounded-xl border border-gray-200 bg-white transition-all duration-200 cursor-pointer">
                    <i class="bi bi-google-fill text-xl text-red-500"></i>
                    <span class="text-xs text-gray-500">Google</span>
                </a>

                <!-- GitHub -->
                <a href="#"
                    class="social-btn flex flex-col items-center justify-center gap-1 py-3 rounded-xl border border-gray-200 bg-white transition-all duration-200 cursor-pointer">
                    <i class="bi bi-github-fill text-xl text-gray-700"></i>
                    <span class="text-xs text-gray-500">GitHub</span>
                </a>

                <!-- Twitter / X -->
                <a href="#"
                    class="social-btn flex flex-col items-center justify-center gap-1 py-3 rounded-xl border border-gray-200 bg-white transition-all duration-200 cursor-pointer">
                    <i class="bi bi-twitter-x text-xl text-blue-500"></i>
                    <span class="text-xs text-gray-500">X</span>
                </a>

            </div>

            <!-- ===== FOOTER LINK ===== -->
            <p class="text-center text-sm text-gray-500 pb-8 pt-0">
                Don't have an account?&nbsp;
                <a href="#" class="font-semibold text-primary hover:underline underline-offset-4">Create one free</a>
            </p>

        </div><!-- end card -->

    </div><!-- end wrapper -->

</body>

</html>
